<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Anime  MiruApp</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icon/apple-touch-icon.png" />
  <link rel="manifest" href="/icon/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">MIRUAPP</a>
  <ul class="navbar-nav">
    <li><a href="/">Home</a></li>
    <li><a href="/ongoing">Ongoing</a></li>
    <li><a href="/movies">Movies</a></li>
    <li><a href="/schedule">Jadwal</a></li>
    <li><a href="/batch">Batch</a></li>
    <li><a href="/daftar-anime">Daftar Anime</a></li>
  </ul>
  <div class="navbar-right">
    <button class="navbar-search-icon" id="searchBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
    <div id="navAuth"></div>
  </div>
</nav>

<!-- Search Modal -->
<div class="search-modal" id="searchModal">
  <div class="search-modal-overlay" id="searchOverlay"></div>
  <div class="search-modal-content">
    <button class="search-modal-close" id="searchCloseBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="search-modal-input-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="modalSearch" placeholder="Cari anime...">
      <button class="search-modal-submit" id="modalSearchSubmit">Cari</button>
    </div>
  </div>
</div>

<!-- HERO -->
<div id="animeHero" class="detail-hero">
  <div class="container">
    <div class="loading-overlay"><div class="spinner"></div><span>Memuat data anime...</span></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="container detail-main" id="mainContent" style="display:none; padding-bottom: var(--space-12);">
  
  <div class="layout-with-sidebar">
    <!-- INFO & SYNOPSIS (LEFT) -->
    <div class="col-left">
      <!-- BATCH -->
      <div class="sidebar-card" id="batchSection" style="display:none">
        <div class="sidebar-card-header">Batch Download</div>
        <div class="sidebar-card-body" id="batchList"></div>
      </div>

      <!-- EPISODE LIST -->
      <div class="sidebar-card" id="epSection" style="display:none">
        <div class="sidebar-card-header">Daftar Episode</div>
        <div class="sidebar-card-body" id="epGrid"></div>
      </div>
    </div>

    <!-- DETAILS (RIGHT) -->
    <div class="col-right">
      <div class="info-panel" id="detailSection">
        <div class="info-panel-header">Informasi Anime</div>
        <div id="infoGrid"></div>
        <div class="info-panel-score" id="infoScore" style="display:none"></div>
      </div>
    </div>
  </div>

</div>

<footer>
  <p>MiruApp Wrapper & UI &copy; 2024</p>
</footer>

<script src="/js/helpers.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/search-modal.js"></script>
<script>
  renderAuthNav();
  const params = new URLSearchParams(location.search);
  const slug   = params.get('slug') || '';

  function toggleSynopsis() {
    const inner  = document.getElementById('synopsisInner');
    const toggle = document.getElementById('synopsisToggle');
    const label  = document.getElementById('synopsisLabel');
    const expanded = inner.classList.toggle('expanded');
    toggle.classList.toggle('expanded', expanded);
    label.textContent = expanded ? 'Sembunyikan' : 'Baca Selengkapnya';
  }

  function initSynopsisToggle() {
    const inner  = document.getElementById('synopsisInner');
    const toggle = document.getElementById('synopsisToggle');
    if (!inner || !toggle) return;

    if (inner.scrollHeight <= inner.clientHeight + 1) {
      inner.classList.add('expanded');
      toggle.style.display = 'none';
    }
  }

  async function loadAnime() {
    if (!slug) {
      document.getElementById('animeHero').innerHTML =
        `<div class="container">${emptyHTML('', 'Slug tidak ditemukan')}</div>`;
      return;
    }
    try {
      const res  = await fetch(`${API}/api/anime/${slug}`);
      const json = await res.json();
      const d    = json.data || {};

      // Store anime data for actions
      currentAnimeData = {
        animeId: d.animeId || slug,
        title: d.title,
        poster: d.poster,
        genres: (d.genreList || []).map(g => g.title)
      };

      const title = d.title || d.english || d.japanese || slug;

      const scoreRaw  = d.score;
      const scoreVal  = scoreRaw ? (typeof scoreRaw === 'object' ? (scoreRaw.value || '').trim() : String(scoreRaw).trim()) : '';
      const scoreUsers = typeof scoreRaw === 'object' ? (scoreRaw.users || '') : '';

      const synRaw = d.synopsis;
      let synHTML  = '';
      let connections = [];
      if (synRaw) {
        if (typeof synRaw === 'object' && Array.isArray(synRaw.paragraphs)) {
          synHTML = synRaw.paragraphs
            .filter(p => p && p.trim())
            .filter(p => !/tonton juga/i.test(p))
            .map(p => `<p>${p}</p>`).join('');
          connections = synRaw.connections || [];
        } else {
          synHTML = `<p>${synRaw}</p>`;
        }
      }

      document.title = `${title}  MiruApp`;

      /*  Genre tags  */
      const genreTags = (d.genreList || []).map(g =>
        `<a class="genre-tag" href="/genres/${g.genreId}">${g.title}</a>`
      ).join('');

      /*  Hero HTML  */
      document.getElementById('animeHero').innerHTML = `
        <div class="container">
          <div class="detail-hero-inner">
            <div class="detail-poster">
              <img src="${d.poster || '/img/placeholder.svg'}" alt="${title}" onerror="this.src='/img/placeholder.svg'"/>
            </div>

            <div class="detail-info">
              <h1 class="detail-title">${title}</h1>
              ${d.english ? `<div class="detail-alt-title">${d.english}</div>` : ''}
              
              <div class="detail-badges">
                ${d.type ? `<span class="badge badge-accent">${d.type}</span>` : ''}
                ${d.status ? `<span class="badge">${d.status}</span>` : ''}
                ${scoreVal ? `<span class="badge">⭐ ${scoreVal}</span>` : ''}
                ${d.episodes ? `<span class="badge">${d.episodes} Eps</span>` : ''}
              </div>

              <div class="detail-synopsis">
                <div class="detail-synopsis-inner" id="synopsisInner">
                  ${synHTML || '<p>Tidak ada sinopsis.</p>'}
                </div>
                <button class="synopsis-toggle" id="synopsisToggle" onclick="toggleSynopsis()">
                  <span id="synopsisLabel">Baca Selengkapnya</span>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </button>
              </div>

              ${connections.length ? `
              <div class="detail-connections">
                <div class="detail-connections-title">Tonton Juga</div>
                <div class="detail-conn-list">
                  ${connections.map(c => `
                    <a class="detail-conn-link" href="/anime?slug=${c.animeId}">
                      <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg>
                      ${c.title}
                    </a>`).join('')}
                </div>
              </div>` : ''}

              ${genreTags ? `<div class="genre-grid">${genreTags}</div>` : ''}

              <div class="detail-actions">
                <button class="detail-action-btn" id="favoriteBtn" onclick="handleFavorite()">
                  <span id="favoriteBtnText">Tambah ke Favorit</span>
                </button>
              </div>
            </div>
          </div>
        </div>`;

      document.getElementById('mainContent').style.display = '';
      initSynopsisToggle();

      /*  Info panel sidebar  */
      function infoCell(label, value) {
        if (value == null || String(value).trim() === '' || value === 'null') return '';
        const isStatus = label === 'Status';
        return `
          <div class="info-panel-cell">
            <div class="info-panel-label">${label}</div>
            <div class="info-panel-value${isStatus ? ' is-ongoing' : ''}">${value}</div>
          </div>`;
      }

      const infoPairs = [
        ['Status',    d.status],
        ['Type',      d.type],
        ['Source',    d.source],
        ['Duration',  d.duration],
        ['Season',    d.season],
        ['Studio',    d.studios],
        ['Producers', d.producers],
        ['Aired',     d.aired],
      ];

      let infoCells = infoCell('Japanese', d.japanese)
                    + infoCell('English',  d.english);
      if (d.episodes) infoCells += infoCell('Episodes', d.episodes);
      infoPairs.forEach(([lbl, val]) => { infoCells += infoCell(lbl, val); });

      document.getElementById('infoGrid').innerHTML =
        `<div class="info-panel-grid">${infoCells}</div>`;

      const scoreEl = document.getElementById('infoScore');
      if (scoreVal) {
        const filled = Math.min(5, Math.round(parseFloat(scoreVal) / 2));
        scoreEl.style.display = '';
        scoreEl.innerHTML = `
          <div class="info-panel-score-top">
            <span class="info-panel-score-label">Score</span>
            ${scoreUsers ? `<span class="info-panel-score-users">(${scoreUsers})</span>` : ''}
          </div>
          <div class="info-panel-stars">
            ${[1,2,3,4,5].map(i => `<span class="${i <= filled ? 'filled' : ''}">★</span>`).join('')}
          </div>
          <div class="info-panel-score-num">${scoreVal}</div>`;
      } else {
        scoreEl.style.display = 'none';
      }

      /*  Batch  */
      const BATCH_BOX_ICON = `<svg viewBox="0 0 24 24"><path d="M3 7v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-6l-2-2H5a2 2 0 0 0-2 2z"/></svg>`;
      const BATCH_ARROW_ICON = `<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`;

      const batches = d.batchList || [];
      if (batches.length) {
        document.getElementById('batchSection').style.display = '';
        document.getElementById('batchList').innerHTML = batches.map(b => `
          <div class="sidebar-anime-item" onclick="window.location.href='/batch-detail?slug=${b.animeId || slug}'">
            <div class="sidebar-anime-thumb">${BATCH_BOX_ICON}</div>
            <div class="sidebar-anime-info">
              <div class="sidebar-anime-title">${b.title || 'Batch Download'}</div>
              <div class="sidebar-anime-ep">Lihat semua link</div>
            </div>
            <span class="batch-arrow">${BATCH_ARROW_ICON}</span>
          </div>`).join('');
      }

      /*  Episode list  */
      const eps = d.episodeList || [];
      if (eps.length) {
        document.getElementById('epSection').style.display = '';

        // Search bar
        document.getElementById('epGrid').insertAdjacentHTML('beforebegin', `
          <div class="ep-search-wrap">
            <input id="epSearch" class="detail-ep-search" type="text" placeholder="Cari episode..."
              oninput="filterEpisodes(this.value)"/>
            <button class="ep-search-btn" aria-label="Cari">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            </button>
          </div>`);

        // Render semua episode
        const renderEps = (list) => {
          document.getElementById('epGrid').innerHTML = list.length
            ? `<div class="ep-list">${list.map(e => {
                const epTitle = String(e.title || '');
                const epNum   = epTitle.match(/Episode\s+(\d+)/i)?.[1] || epTitle;
                return `
                  <div class="ep-btn" onclick="goEpisode('${e.episodeId || ''}')">
                    ${epNum}
                  </div>`;
              }).join('')}</div>`
            : `<div style="color:var(--color-secondary);font-size:.85rem;padding:.5rem;font-family:var(--font-mono);">
                 Tidak ada episode yang cocok
               </div>`;
        };

        renderEps(eps);

        // Filter function  expose ke global
        window.filterEpisodes = (q) => {
          const trimmed = q.trim().toLowerCase();
          if (!trimmed) { renderEps(eps); return; }
          const filtered = eps.filter(e => {
            const epTitle = String(e.title || '').toLowerCase();
            const epNum   = epTitle.match(/episode\s+(\d+)/i)?.[1] || epTitle;
            return epNum.includes(trimmed) || epTitle.includes(trimmed);
          });
          renderEps(filtered);
        };
      }

      // Update favorite button
      updateActionButtons();

    } catch (err) {
      console.error(err);
      document.getElementById('animeHero').innerHTML =
        `<div class="container">${errorHTML(err.message)}</div>`;
    }
  }

  let currentAnimeData = null;

  function updateActionButtons() {
    if (!currentAnimeData) return;
    if (!Auth.isLoggedIn()) {
      const favBtn = document.getElementById('favoriteBtn');
      if (favBtn) favBtn.style.display = 'none';
      return;
    }

    isFavorite(currentAnimeData.animeId).then(isFav => {
      const favBtn     = document.getElementById('favoriteBtn');
      const favBtnText = document.getElementById('favoriteBtnText');
      if (!favBtn) return;
      favBtn.classList.toggle('active', isFav);
      favBtnText.textContent = isFav ? 'Hapus dari Favorit' : 'Tambah ke Favorit';
    });
  }

  async function handleFavorite() {
    if (!Auth.isLoggedIn()) { window.location.href = '/login'; return; }
    if (!currentAnimeData) return;

    const favBtn     = document.getElementById('favoriteBtn');
    const favBtnText = document.getElementById('favoriteBtnText');
    favBtn.disabled  = true;

    const isAdded = await toggleFavorite({
      animeId: currentAnimeData.animeId,
      title:   currentAnimeData.title,
      poster:  currentAnimeData.poster,
    });

    favBtn.classList.toggle('active', isAdded);
    favBtnText.textContent = isAdded ? 'Hapus dari Favorit' : 'Tambah ke Favorit';
    favBtn.disabled = false;
    showNotification(isAdded ? 'Ditambahkan ke favorit!' : 'Dihapus dari favorit');
  }

  function showNotification(message) {
    const notif = document.createElement('div');
    notif.textContent = message;
    notif.style.cssText = `
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--color-primary);
      color: var(--color-black);
      padding: var(--space-4) var(--space-6);
      border: var(--border-thick) solid var(--color-border);
      box-shadow: var(--shadow-xl);
      font-family: var(--font-mono);
      font-size: 0.875rem;
      font-weight: 700;
      z-index: 9999;
      animation: slideIn 0.3s ease;
    `;
    document.body.appendChild(notif);

    setTimeout(() => {
      notif.style.animation = 'slideOut 0.3s ease';
      setTimeout(() => notif.remove(), 300);
    }, 2000);
  }

  // Add animation styles
  const style = document.createElement('style');
  style.textContent = `
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }
  `;
  document.head.appendChild(style);

  loadAnime();
</script>
</body>
</html>
