<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch Detail  MiruApp</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icon/apple-touch-icon.png" />
  <link rel="manifest" href="/icon/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .download-section {
      margin-top: 0;
    }

    .download-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-6);
      width: 100%;
    }

    .download-card {
      background: var(--color-white);
      border: 3px solid var(--color-border);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .download-card-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 16px;
      color: var(--color-primary);
      background: var(--color-black);
      padding: .75rem 1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      border-bottom: 3px solid var(--color-border);
    }

    .download-card-title svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      stroke: var(--color-primary);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .download-quality-item {
      padding: .875rem 1rem;
      border-bottom: 2px solid #eee;
    }

    .download-quality-item:last-child {
      border-bottom: none;
    }

    .quality-label {
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: 900;
      color: var(--color-black);
      margin-bottom: var(--space-3);
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--color-primary);
      padding: var(--space-1) var(--space-3);
      border: 2px solid var(--color-border);
    }

    .download-btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .dl-btn {
      background: var(--color-white);
      border: 2px solid var(--color-border);
      box-shadow: 2px 2px 0 var(--color-border);
      padding: var(--space-2) var(--space-3);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: transform var(--duration-fast) var(--ease-snap),
                  box-shadow var(--duration-fast) var(--ease-snap),
                  background var(--duration-fast) var(--ease-snap);
      color: var(--color-black);
      text-decoration: none;
      display: inline-block;
    }

    .dl-btn:hover {
      background: var(--color-primary);
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 var(--color-border);
    }

    .dl-btn.dead {
      text-decoration: line-through;
      opacity: 0.35;
      pointer-events: none;
    }

    .dl-section-title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: var(--space-6);
      color: var(--color-black);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .dl-section-title svg {
      width: 22px;
      height: 22px;
      stroke: var(--color-black);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 768px) {
      .download-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">MIRUAPP</a>
  <ul class="navbar-nav">
    <li><a href="/">Home</a></li>
    <li><a href="/ongoing">Ongoing</a></li>
    <li><a href="/movies">Movies</a></li>
    <li><a href="/schedule">Jadwal</a></li>
    <li><a href="/batch" class="active">Batch</a></li>
    <li><a href="/daftar-anime">Daftar Anime</a></li>
  </ul>
  <div class="navbar-right">
    <button class="navbar-search-icon" id="searchBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
    <div id="navAuth"></div>
  </div>
</nav>

<div class="search-modal" id="searchModal">
  <div class="search-modal-overlay" id="searchOverlay"></div>
  <div class="search-modal-content">
    <button class="search-modal-close" id="searchCloseBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="search-modal-input-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="modalSearch" placeholder="Cari anime...">
      <button class="search-modal-submit" id="modalSearchSubmit">Cari</button>
    </div>
  </div>
</div>

<div id="batchHero" class="detail-hero">
  <div class="container">
    <div class="loading-overlay"><div class="spinner"></div><span>Menyiapkan detail batch...</span></div>
  </div>
</div>

<div class="container detail-main" id="mainContent" style="display:none; padding-bottom: var(--space-12);">
  <div class="layout-with-sidebar">
    <div class="col-left">
      <section class="download-section" id="dlSection" style="display:none">
        <h2 class="dl-section-title" id="dlSectionTitle"></h2>
        <div id="dlLinks" class="download-grid"></div>
      </section>
    </div>

    <div class="col-right">
      <div class="info-panel" id="detailSection">
        <div class="info-panel-header">Informasi Anime</div>
        <div id="infoGrid"></div>
        <div class="info-panel-score" id="infoScore" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<footer>
  <p>MiruApp Wrapper & UI &copy; 2024</p>
</footer>

<script src="/js/helpers.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/search-modal.js"></script>
<script>
  renderAuthNav();
  const getSlugFromPath = (pathPart) => {
    const pathParts = location.pathname.split('/').filter(Boolean);
    const index = pathParts.indexOf(pathPart);
    return index !== -1 && pathParts[index + 1] ? decodeURIComponent(pathParts[index + 1]) : '';
  };
  let slug = getSlugFromPath('batch');
  if (!slug) {
    const params = new URLSearchParams(location.search);
    slug = params.get('slug') || '';
  }

  const DL_ICON = `<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
  const BATCH_ICON = `<svg viewBox="0 0 24 24"><path d="M3 7v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-6l-2-2H5a2 2 0 0 0-2 2z"/></svg>`;

  function toggleSynopsis() {
    const inner  = document.getElementById('synopsisInner');
    const toggle = document.getElementById('synopsisToggle');
    const label  = document.getElementById('synopsisLabel');
    const expanded = inner.classList.toggle('expanded');
    toggle.classList.toggle('expanded', expanded);
    label.textContent = expanded ? 'Sembunyikan' : 'Baca Selengkapnya';
  }

  function initSynopsisToggle() {
    const inner  = document.getElementById('synopsisInner');
    const toggle = document.getElementById('synopsisToggle');
    if (!inner || !toggle) return;

    if (inner.scrollHeight <= inner.clientHeight + 1) {
      inner.classList.add('expanded');
      toggle.style.display = 'none';
    }
  }

  async function loadBatch() {
    if (!slug) {
      document.getElementById('batchHero').innerHTML =
        `<div class="container">${emptyHTML('', 'Slug tidak ditemukan')}</div>`;
      return;
    }
    try {
      const res  = await fetch(`${API}/api/batch/${slug}`);
      const json = await res.json();

      if (!json.status || !json.data || !json.data.title) {
        window.location.href = `/anime/${slug}`;
        return;
      }

      const d = json.data || {};
      const title = d.title || d.english || d.japanese || slug;

      const scoreRaw   = d.score;
      const scoreVal   = scoreRaw ? (typeof scoreRaw === 'object' ? (scoreRaw.value || '').trim() : String(scoreRaw).trim()) : '';
      const scoreUsers = typeof scoreRaw === 'object' ? (scoreRaw.users || '') : '';

      const synRaw = d.synopsis || d.description;
      let synHTML  = '';
      let connections = [];
      if (synRaw) {
        if (typeof synRaw === 'object' && Array.isArray(synRaw.paragraphs)) {
          synHTML = synRaw.paragraphs
            .filter(p => p && p.trim())
            .filter(p => !/tonton juga/i.test(p))
            .map(p => `<p>${p}</p>`).join('');
          connections = synRaw.connections || [];
        } else {
          synHTML = `<p>${synRaw}</p>`;
        }
      }

      document.title = `${title}  MiruApp`;

      const genreTags = (d.genreList || []).map(g =>
        `<a class="genre-tag" href="/genres/${g.genreId}">${g.title}</a>`
      ).join('');

      document.getElementById('batchHero').innerHTML = `
        <div class="container">
          <div class="detail-hero-inner">
            <div class="detail-poster">
              <img src="${d.poster || '/img/placeholder.svg'}" alt="${title}" onerror="this.src='/img/placeholder.svg'"/>
            </div>

            <div class="detail-info">
              <h1 class="detail-title">${title}</h1>
              ${d.english ? `<div class="detail-alt-title">${d.english}</div>` : ''}

              <div class="detail-badges">
                <span class="badge badge-accent">Batch</span>
                ${d.type ? `<span class="badge badge-accent">${d.type}</span>` : ''}
                ${d.status ? `<span class="badge">${d.status}</span>` : ''}
                ${scoreVal ? `<span class="badge">⭐ ${scoreVal}</span>` : ''}
                ${d.episodes ? `<span class="badge">${d.episodes} Eps</span>` : ''}
              </div>

              <div class="detail-synopsis">
                <div class="detail-synopsis-inner" id="synopsisInner">
                  ${synHTML || '<p>Tidak ada sinopsis.</p>'}
                </div>
                <button class="synopsis-toggle" id="synopsisToggle" onclick="toggleSynopsis()">
                  <span id="synopsisLabel">Baca Selengkapnya</span>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </button>
              </div>

              ${connections.length ? `
              <div class="detail-connections">
                <div class="detail-connections-title">Tonton Juga</div>
                <div class="detail-conn-list">
                  ${connections.map(c => `
                    <a class="detail-conn-link" href="/anime/${c.animeId}">
                      <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg>
                      ${c.title}
                    </a>`).join('')}
                </div>
              </div>` : ''}

              ${genreTags ? `<div class="genre-grid">${genreTags}</div>` : ''}
            </div>
          </div>
        </div>`;

      document.getElementById('mainContent').style.display = '';
      initSynopsisToggle();

      function infoCell(label, value) {
        if (value == null || String(value).trim() === '' || value === 'null') return '';
        const isStatus = label === 'Status';
        return `
          <div class="info-panel-cell">
            <div class="info-panel-label">${label}</div>
            <div class="info-panel-value${isStatus ? ' is-ongoing' : ''}">${value}</div>
          </div>`;
      }

      const infoPairs = [
        ['Status',    d.status],
        ['Type',      d.type],
        ['Source',    d.source],
        ['Duration',  d.duration],
        ['Season',    d.season],
        ['Studio',    d.studios],
        ['Producers', d.producers],
        ['Aired',     d.aired],
        ['Credit',    d.credit],
      ];

      let infoCells = infoCell('Japanese', d.japanese)
                    + infoCell('English',  d.english);
      if (d.episodes) infoCells += infoCell('Episodes', d.episodes);
      infoPairs.forEach(([lbl, val]) => { infoCells += infoCell(lbl, val); });

      document.getElementById('infoGrid').innerHTML =
        `<div class="info-panel-grid">${infoCells}</div>`;

      const scoreEl = document.getElementById('infoScore');
      if (scoreVal) {
        const filled = Math.min(5, Math.round(parseFloat(scoreVal) / 2));
        scoreEl.style.display = '';
        scoreEl.innerHTML = `
          <div class="info-panel-score-top">
            <span class="info-panel-score-label">Score</span>
            ${scoreUsers ? `<span class="info-panel-score-users">(${scoreUsers})</span>` : ''}
          </div>
          <div class="info-panel-stars">
            ${[1,2,3,4,5].map(i => `<span class="${i <= filled ? 'filled' : ''}">★</span>`).join('')}
          </div>
          <div class="info-panel-score-num">${scoreVal}</div>`;
      } else {
        scoreEl.style.display = 'none';
      }

      const formats = d.downloadUrl?.formats || d.downloads || [];
      if (formats.length) {
        document.getElementById('dlSection').style.display = 'block';
        document.getElementById('dlSectionTitle').innerHTML = `${BATCH_ICON} Link Download Batch`;
        document.getElementById('dlLinks').innerHTML = formats.map(fmt => {
          const fmtLabel = fmt.title.split(' ')[0] || fmt.title;
          return `
          <div class="download-card">
            <div class="download-card-title">${DL_ICON} ${fmtLabel}</div>
            ${(fmt.qualities || []).map(q => `
              <div class="download-quality-item">
                <span class="quality-label">${q.title.trim()}</span>
                <div class="download-btn-group">
                  ${(q.urls || []).map(u => {
                    const isDead = !u.url || u.url === '#' || u.url.trim() === '' || (u.title && u.title.includes('<s>'));
                    const cleanTitle = (u.title || 'Download').replace(/<\/?s>/g, '');
                    return `<a href="${u.url || '#'}" target="_blank" class="dl-btn ${isDead ? 'dead' : ''}">${cleanTitle}</a>`;
                  }).join('')}
                </div>
              </div>`).join('')}
          </div>`;
        }).join('');
      }

    } catch (err) {
      console.error(err);
      document.getElementById('batchHero').innerHTML =
        `<div class="container">${errorHTML(err.message)}</div>`;
    }
  }

  loadBatch();
</script>
</body>
</html>
