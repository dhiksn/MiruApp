<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch Download  MiruApp</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icon/apple-touch-icon.png" />
  <link rel="manifest" href="/icon/site.webmanifest" />
  <style>
    .batch-desc {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--color-black);
      margin-bottom: var(--space-6);
      line-height: 1.7;
    }
    .batch-desc strong { color: var(--color-secondary); font-weight: 700; }

    /* Grid card */
    .batch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: var(--space-6);
    }

    .batch-card {
      background: var(--color-surface);
      border: var(--border-thick) solid var(--color-border);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--duration-base) var(--ease-snap), box-shadow var(--duration-base) var(--ease-snap);
    }
    .batch-card:hover {
      transform: translate(-3px, -3px);
      box-shadow: var(--shadow-xl);
    }

    /* Poster */
    .batch-card-thumb {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: var(--color-muted);
      border-bottom: var(--border) solid var(--color-border);
    }
    .batch-card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Badge type kiri atas */
    .batch-badge-type {
      position: absolute;
      top: var(--space-3);
      left: var(--space-3);
      background: var(--color-tertiary);
      color: var(--color-black);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 700;
      padding: var(--space-2) var(--space-3);
      border: 2px solid var(--color-border);
      box-shadow: 2px 2px 0px var(--color-border);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Badge score kanan atas */
    .batch-badge-score {
      position: absolute;
      top: var(--space-3);
      right: var(--space-3);
      background: var(--color-white);
      color: var(--color-black);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 700;
      padding: var(--space-2) var(--space-3);
      border: 2px solid var(--color-border);
      box-shadow: 2px 2px 0px var(--color-border);
    }

    /* Info */
    .batch-card-info {
      padding: var(--space-4);
    }
    .batch-card-title {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--color-black);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }
    .batch-card-status {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-black);
      opacity: 0.7;
      margin-top: var(--space-3);
    }

    @media (max-width: 600px) {
      .batch-grid { grid-template-columns: repeat(3, 1fr); gap: var(--space-4); }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">MIRUAPP</a>
  <ul class="navbar-nav">
    <li><a href="/">Home</a></li>
    <li><a href="/ongoing">Ongoing</a></li>
    <li><a href="/movies">Movies</a></li>
    <li><a href="/schedule">Jadwal</a></li>
    <li><a href="/batch" class="active">Batch</a></li>
    <li><a href="/daftar-anime">Daftar Anime</a></li>
  </ul>
  <div class="navbar-right">
    <button class="navbar-search-icon" id="searchBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
    <div id="navAuth"></div>
  </div>
</nav>

<!-- Search Modal -->
<div class="search-modal" id="searchModal">
  <div class="search-modal-overlay" id="searchOverlay"></div>
  <div class="search-modal-content">
    <button class="search-modal-close" id="searchCloseBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="search-modal-input-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="modalSearch" placeholder="Cari anime...">
      <button class="search-modal-submit" id="modalSearchSubmit">Cari</button>
    </div>
  </div>
</div>

<div class="container" style="padding-bottom:var(--space-12)">
  <section class="section">
    <div class="section-title">Daftar Batch Anime</div>

    <p class="batch-desc">
      Daftar batch <strong>Anime Sub Indo</strong> lengkap yang bisa kamu tonton di MiruApp.
      Kamu bisa download dan streaming anime Indo terbaru gratis dan berkualitas tinggi.
    </p>

    <div id="grid" class="batch-grid"></div>
    <div id="pagination" class="pagination"></div>
  </section>
</div>

<footer><p>MiruApp Wrapper &copy; 2024</p></footer>

<script src="/js/helpers.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/search-modal.js"></script>
<script>
  renderAuthNav();

  function batchCard(b) {
    const id    = b.batchId || b.animeId || b.slug || '';
    const score = b.score && b.score !== '0' && b.score !== '' ? b.score : null;
    return `
      <div class="batch-card" onclick="window.location.href='/batch/${id}'">
        <div class="batch-card-thumb">
          <img src="${b.poster || '/img/placeholder.svg'}" alt="${b.title}"
               loading="lazy" onerror="this.src='/img/placeholder.svg'"/>
          <span class="batch-badge-type">${b.type || 'TV'}</span>
          ${score ? `<span class="batch-badge-score">⭐ ${score}</span>` : ''}
        </div>
        <div class="batch-card-info">
          <div class="batch-card-title">${b.title}</div>
          <div class="batch-card-status">${b.status || ''}</div>
        </div>
      </div>`;
  }

  async function loadPage(page) {
    const grid = document.getElementById('grid');
    grid.innerHTML = loadingHTML();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    try {
      const res  = await fetch(`${API}/api/batch?page=${page}`);
      const json = await res.json();
      const data = json.data?.batchList || json.data?.animeList || json.data || [];
      grid.innerHTML = data.length ? data.map(batchCard).join('') : emptyHTML('', 'Tidak ada batch');
      let hasNext = data.length >= 10;
      if (hasNext) {
        hasNext = await checkHasNext(`${API}/api/batch`, page, (j) => j.data?.batchList || j.data?.animeList || j.data || []);
      }
      renderPagination('pagination', page, hasNext, 'loadPage');
    } catch (err) {
      grid.innerHTML = errorHTML(err.message);
    }
  }

  const p = new URLSearchParams(location.search);
  loadPage(parseInt(p.get('page')) || 1);
</script>
</body>
</html>
