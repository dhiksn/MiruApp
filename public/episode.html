<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tonton Episode  MiruApp</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icon/apple-touch-icon.png" />
  <link rel="manifest" href="/icon/site.webmanifest" />
  <!-- ArtPlayer -->
  <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
  <!-- HLS.js for m3u8 -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <style>
    .watch-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: var(--space-8);
      padding: var(--space-4) 0 var(--space-8) 0;
    }
    .player-container {
      border: var(--border-thick) solid var(--color-border);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
      aspect-ratio: 16/9;
      position: relative;
      background: var(--color-black);
    }
    #artplayer-app {
      width: 100%;
      height: 100%;
    }
    .player-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: var(--space-4); color: var(--color-white);
      font-size: var(--text-base);
      font-family: var(--font-mono);
    }

    /* SIDEBAR STYLES */
    .sidebar-card {
      background: var(--color-white);
      border: 3px solid var(--color-border);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .sidebar-card-header {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 900;
      color: var(--color-black);
      background: var(--color-primary);
      padding: .75rem 1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 3px solid var(--color-border);
    }
    .ep-title {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 900;
      text-transform: uppercase;
      color: var(--color-black);
      display: flex;
      align-items: baseline;
      gap: var(--space-3);
    }
    .ep-title span {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--color-secondary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .server-group {
      background: var(--color-white);
      border: 3px solid var(--color-border);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      margin-top: var(--space-6);
    }

    .server-quality-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 900;
      color: #FFE500;
      background: var(--color-black);
      padding: .75rem 1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .quality-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      border-top: 3px solid var(--color-border);
      border-bottom: 3px solid var(--color-border);
      background: var(--color-muted);
    }

    .quality-tab {
      padding: .625rem 1.25rem;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      border: none;
      border-right: 3px solid var(--color-border);
      background: transparent;
      color: var(--color-black);
      cursor: pointer;
      transition: background var(--duration-fast) var(--ease-snap);
      box-shadow: none;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transform: none !important;
    }

    .quality-tab:last-child { border-right: none; }
    .quality-tab:hover { background: var(--color-white); }

    .quality-tab.active {
      background: var(--color-primary);
      color: var(--color-black);
      box-shadow: none;
      transform: none !important;
    }

    .quality-servers {
      display: none;
      padding: 1rem;
      border-top: none;
    }

    .quality-servers.active {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
    }

    .server-btn {
      background: var(--color-white);
      border: 3px solid var(--color-border);
      box-shadow: 3px 3px 0 var(--color-border);
      padding: .625rem 1.25rem;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--duration-fast) var(--ease-snap),
                  box-shadow var(--duration-fast) var(--ease-snap),
                  background var(--duration-fast) var(--ease-snap);
      color: var(--color-black);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .server-btn:hover {
      background: var(--color-primary);
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--color-border);
    }

    .server-btn.active {
      background: var(--color-black);
      color: var(--color-primary);
      transform: translate(2px, 2px);
      box-shadow: none;
    }
    .ep-nav-wrap {
      display: flex;
      gap: var(--space-4);
      margin-top: var(--space-6);
    }
    .nav-btn {
      flex: 1;
      padding: var(--space-4) var(--space-6);
      background: var(--color-white);
      border: var(--border-thick) solid var(--color-border);
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: var(--text-sm);
      transition: transform var(--duration-fast) var(--ease-snap), box-shadow var(--duration-fast) var(--ease-snap), background var(--duration-fast) var(--ease-snap);
      cursor: pointer;
      text-transform: uppercase;
    }
    .nav-btn:hover { background: var(--color-primary); transform: translate(-2px, -2px); box-shadow: var(--shadow-md); }

    .download-section {
      margin-top: var(--space-8);
      grid-column: 1 / -1;
    }

    .download-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-6);
      width: 100%;
    }

    .download-card {
      background: var(--color-white);
      border: 3px solid var(--color-border);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .download-card-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 16px;
      color: var(--color-primary);
      background: var(--color-black);
      padding: .75rem 1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      border-bottom: 3px solid var(--color-border);
    }
    .download-card-title svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      stroke: var(--color-primary);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .download-quality-item {
      padding: .875rem 1rem;
      border-bottom: 2px solid #eee;
    }

    .download-quality-item:last-child {
      border-bottom: none;
    }

    .quality-label {
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: 900;
      color: var(--color-black);
      margin-bottom: var(--space-3);
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--color-primary);
      padding: var(--space-1) var(--space-3);
      border: 2px solid var(--color-border);
    }

    .download-btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .dl-btn {
      background: var(--color-white);
      border: 2px solid var(--color-border);
      box-shadow: 2px 2px 0 var(--color-border);
      padding: var(--space-2) var(--space-3);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: transform var(--duration-fast) var(--ease-snap),
                  box-shadow var(--duration-fast) var(--ease-snap),
                  background var(--duration-fast) var(--ease-snap);
      color: var(--color-black);
      text-decoration: none;
      display: inline-block;
    }

    .dl-btn:hover {
      background: var(--color-primary);
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 var(--color-border);
    }

    .dl-btn.dead {
      text-decoration: line-through;
      opacity: 0.35;
      pointer-events: none;
    }

    .info-list {
      display: flex;
      flex-direction: column;
    }

    .info-row-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: .75rem 1rem;
      border-bottom: 2px solid #eee;
    }

    .info-row-item:last-child {
      border-bottom: none;
    }

    .info-row-lbl {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .info-row-val {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--color-black);
      line-height: 1.45;
      word-break: break-word;
    }

    @media (max-width: 1000px) {
      .watch-layout { grid-template-columns: 1fr; }
      .download-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .ep-title { font-size: var(--text-xl); flex-direction: column; gap: var(--space-2); }
      .nav-btn span { display: none; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">MIRUAPP</a>
  <ul class="navbar-nav">
    <li><a href="/">Home</a></li>
    <li><a href="/ongoing">Ongoing</a></li>
    <li><a href="/movies">Movies</a></li>
    <li><a href="/schedule">Jadwal</a></li>
    <li><a href="/batch">Batch</a></li>
    <li><a href="/daftar-anime">Daftar Anime</a></li>
  </ul>
  <div class="navbar-right">
    <button class="navbar-search-icon" id="searchBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
    <div id="navAuth"></div>
  </div>
</nav>

<!-- Search Modal -->
<div class="search-modal" id="searchModal">
  <div class="search-modal-overlay" id="searchOverlay"></div>
  <div class="search-modal-content">
    <button class="search-modal-close" id="searchCloseBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="search-modal-input-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="modalSearch" placeholder="Cari anime...">
      <button class="search-modal-submit" id="modalSearchSubmit">Cari</button>
    </div>
  </div>
</div>

<div class="container">
  <!-- JUDUL EPISODE FULL WIDTH -->
  <div class="ep-header" style="margin-top: var(--space-8); margin-bottom: var(--space-1);">
    <h1 class="ep-title" id="epTitle"><span>Sabar Ya...</span> Memuat Episode...</h1>
  </div>

  <div class="watch-layout">
    <!-- LEFT: PLAYER & CONTROLS -->
    <div class="watch-main">
      <div class="player-container" id="playerWrap">
        <div class="player-placeholder">
          <div class="spinner" style="border-color: var(--color-white); border-top-color: var(--color-primary);"></div>
          <span>Pilih server untuk mulai menonton</span>
        </div>
      </div>

      <!-- SERVER SELECTION -->
      <div id="serverSection"></div>

      <!-- EP NAVIGATION -->
      <div class="ep-nav-wrap" id="epNav"></div>
    </div>

    <!-- RIGHT: SIDEBAR INFO -->
    <aside class="watch-sidebar">
      <div class="sidebar-card">
        <div class="sidebar-card-header">Info Tayangan</div>
        <div class="sidebar-card-body" id="epInfoSidebar">
          <div class="loading-overlay" style="padding: var(--space-4);"><div class="spinner"></div></div>
        </div>
      </div>
    </aside>

    <!-- DOWNLOADS — full width -->
    <div class="download-section" id="downloadSection" style="display: none;">
      <div class="section-title">Link Download</div>
      <div class="download-grid" id="downloadLinks"></div>
    </div>
  </div>
</div>

<footer>
  <p>MiruApp Wrapper & UI &copy; 2024</p>
</footer>

<script src="/js/helpers.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/search-modal.js"></script>
<script>
  initNavSearch();
  renderAuthNav();
  const getSlugFromPath = (pathPart) => {
    const pathParts = location.pathname.split('/').filter(Boolean);
    const index = pathParts.indexOf(pathPart);
    return index !== -1 && pathParts[index + 1] ? decodeURIComponent(pathParts[index + 1]) : '';
  };
  let slug = getSlugFromPath('episode');
  if (!slug) {
    const params = new URLSearchParams(location.search);
    slug = params.get('slug') || '';
  }

  function switchQuality(id, tab) {
    document.querySelectorAll('.quality-servers').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.quality-tab').forEach(el => el.classList.remove('active'));
    document.getElementById(id)?.classList.add('active');
    tab.classList.add('active');
  }

  const DL_ICON = `<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

  async function loadEpisode() {
    if (!slug) {
      document.getElementById('epTitle').innerHTML = ' Slug tidak ditemukan';
      return;
    }
    try {
      const res  = await fetch(`${API}/api/episode/${slug}`);
      const json = await res.json();
      const d    = json.data || {};

      currentEpisodeData = {
        episodeId: d.episodeId || slug,
        animeId: d.animeId,
        animeTitle: d.animeTitle || d.animeId,
        title: d.title,
        episode: d.episode || extractEpisodeNumber(d.title),
        poster: d.poster || '/img/placeholder.svg'
      };

      window._currentVideoTitle = d.title || slug;
      window._currentVideoCover = d.poster || null;

      document.title = `${d.title || 'Episode'}  MiruApp`;
      document.getElementById('epTitle').innerHTML = `<span>Episode</span> ${d.title || slug}`;

      const qualities = d.server?.qualities || [];
      const serverSec = document.getElementById('serverSection');
      const validQualities = qualities.filter(q => q.serverList?.length > 0);

      let resumePosition = 0;
      let resumeServerId = null;
      if (Auth.isLoggedIn()) {
        try {
          const hRes  = await authFetch(`/api/user/history/${encodeURIComponent(slug)}`);
          const hJson = await hRes.json();
          if (hJson.success && hJson.data) {
            resumePosition = hJson.data.last_position || 0;
            resumeServerId = hJson.data.last_server_id || null;
          }
        } catch(e) { /* abaikan */ }
      }

      if (validQualities.length) {
        const lastChoice = getLastChoice();

        const tabsHTML = validQualities.map((q, i) => {
          const qTitle = getQualityTitle(q, i);
          return `
            <div class="quality-tab ${(i === 0 && !lastChoice.quality) || (lastChoice.quality && qTitle.toLowerCase() === lastChoice.quality.toLowerCase()) ? 'active' : ''}"
                 onclick="switchQuality('q${i}', this)">
              ${qTitle.toUpperCase()}
            </div>`;
        }).join('');

        const serversHTML = validQualities.map((q, i) => {
          const qTitle = getQualityTitle(q, i);
          return `
            <div class="quality-servers ${(i === 0 && !lastChoice.quality) || (lastChoice.quality && qTitle.toLowerCase() === lastChoice.quality.toLowerCase()) ? 'active' : ''}" id="q${i}">
              ${q.serverList.map(s => {
                const sTitle = getServerTitle(s);
                return `
                  <button class="server-btn" data-server-id="${s.serverId}" 
                          data-quality-title="${qTitle}"
                          data-server-title="${sTitle}"
                          onclick="loadServerById('${s.serverId}', this, 0)">
                    ${sTitle}
                  </button>`;
              }).join('')}
            </div>`;
        }).join('');

        serverSec.innerHTML = `
          <div class="server-group">
            <div class="server-quality-title">Pilih Kualitas & Server</div>
            <div class="quality-tabs">${tabsHTML}</div>
            ${serversHTML}
          </div>`;

        const allServers = validQualities.flatMap(q => q.serverList || []);
        let targetServer = null;

        if (resumeServerId) {
          targetServer = allServers.find(s => s.serverId === resumeServerId);
        }

        if (!targetServer && lastChoice.quality && lastChoice.server) {
          for (let i = 0; i < validQualities.length; i++) {
            const q = validQualities[i];
            const qTitle = getQualityTitle(q, i);
            if (qTitle.toLowerCase() === lastChoice.quality.toLowerCase()) {
              const matchingServer = q.serverList.find(s => {
                const sTitle = getServerTitle(s);
                return sTitle.toLowerCase().includes(lastChoice.server.toLowerCase());
              });
              if (matchingServer) {
                targetServer = matchingServer;
                break;
              }
            }
          }
        }

        if (!targetServer) {
          targetServer = validQualities[0]?.serverList?.[0];
        }

        if (targetServer) {
          let targetBtn = null;
          for (let qIndex = 0; qIndex < validQualities.length; qIndex++) {
            const q = validQualities[qIndex];
            const serverInThisQuality = q.serverList.find(s => s.serverId === targetServer.serverId);
            if (serverInThisQuality) {
              const tabBtn = serverSec.querySelectorAll('.quality-tab')[qIndex];
              if (tabBtn) switchQuality(`q${qIndex}`, tabBtn);
              targetBtn = serverSec.querySelector(`[data-server-id="${targetServer.serverId}"]`);
              break;
            }
          }
          
          if (targetBtn) {
            loadServerById(targetServer.serverId, targetBtn, resumePosition);
          }
        }

        if (resumePosition > 5) {
          const mins = Math.floor(resumePosition / 60);
          const secs = Math.floor(resumePosition % 60).toString().padStart(2, '0');
          showResumeToast(`Melanjutkan dari ${mins}:${secs}`);
        }
      } else if (d.defaultStreamingUrl) {
         document.getElementById('playerWrap').innerHTML = `<iframe src="${d.defaultStreamingUrl}" allowfullscreen allow="autoplay; fullscreen" style="width:100%;height:100%;border:none;"></iframe>`;
         serverSec.innerHTML = '<div class="server-group"><p style="font-size:var(--text-sm);font-family:var(--font-mono);color:var(--color-secondary);">Menggunakan server default</p></div>';
      }

      const navEl = document.getElementById('epNav');
      let navHTML = '';
      if (d.prevEpisode?.episodeId) {
        navHTML += `<div class="nav-btn" onclick="goEpisode('${d.prevEpisode.episodeId}')">← <span>Eps Sebelumnya</span></div>`;
      }
      if (d.animeId) {
        navHTML += `<div class="nav-btn" onclick="MiruApp('${d.animeId}')">☰ <span>Semua Eps</span></div>`;
      }
      if (d.nextEpisode?.episodeId) {
        navHTML += `<div class="nav-btn" onclick="goEpisode('${d.nextEpisode.episodeId}')"><span>Eps Berikutnya</span> →</div>`;
      }
      navEl.innerHTML = navHTML;

      const formats = d.downloadUrl?.formats || [];
      if (formats.length) {
        document.getElementById('downloadSection').style.display = 'block';
        document.getElementById('downloadLinks').innerHTML = formats.map(fmt => {
          const fmtLabel = fmt.title.split(' ')[0] || fmt.title;
          return `
          <div class="download-card">
            <div class="download-card-title">${DL_ICON} ${fmtLabel}</div>
            ${(fmt.qualities || []).map(q => `
              <div class="download-quality-item">
                <span class="quality-label">${q.title.trim()}</span>
                <div class="download-btn-group">
                  ${(q.urls || []).map(u => {
                    const isDead = !u.url || u.url === '#' || u.url.trim() === '' || (u.title && u.title.includes('<s>'));
                    const cleanTitle = (u.title || 'Download').replace(/<\/?s>/g, '');
                    return `<a href="${u.url || '#'}" target="_blank" class="dl-btn ${isDead ? 'dead' : ''}">${cleanTitle}</a>`;
                  }).join('')}
                </div>
              </div>`).join('')}
          </div>`;
        }).join('');
      }

      document.getElementById('epInfoSidebar').innerHTML = `
        <div class="info-list">
          <div class="info-row-item">
            <span class="info-row-lbl">Judul Lengkap</span>
            <span class="info-row-val">${d.title || '-'}</span>
          </div>
          <div class="info-row-item">
            <span class="info-row-lbl">Tanggal Rilis</span>
            <span class="info-row-val">${d.releasedOn || '-'}</span>
          </div>
          <div class="info-row-item">
            <span class="info-row-lbl">Nama Anime</span>
            <span class="info-row-val">
              ${d.animeId
                ? `<a href="/anime/${d.animeId}" style="color:var(--color-black);text-decoration:none;font-weight:700;border-bottom:2px solid var(--color-primary);padding-bottom:1px;">${d.animeId}</a>`
                : '-'}
            </span>
          </div>
          <div class="info-row-item">
            <span class="info-row-lbl">Genre</span>
            <div style="display:flex;flex-wrap:wrap;gap:var(--space-2);margin-top:var(--space-2);">
              ${(d.genreList || []).map(g =>
                `<a href="/genres/${g.genreId}" class="genre-tag" style="padding:var(--space-2) var(--space-4);font-size:var(--text-xs);box-shadow:none;">${g.title}</a>`
              ).join('')}
            </div>
          </div>
        </div>`;

    } catch (err) {
      document.getElementById('epTitle').innerHTML = ' Gagal memuat episode';
      console.error(err);
    }
  }

  let artInstance = null;
  let currentEpisodeData = null;
  let _saveProgressTimer = null;

  window._currentVideoTitle = null;
  window._currentVideoCover = null;
  window._currentServerId   = null;

  function saveLastChoice(qualityTitle, serverTitle) {
    localStorage.setItem('last_quality', qualityTitle);
    localStorage.setItem('last_server', serverTitle);
  }

  function getLastChoice() {
    return {
      quality: localStorage.getItem('last_quality'),
      server: localStorage.getItem('last_server')
    };
  }

  function normalizeText(value) {
    return (value ?? '').toString().trim();
  }

  function getServerTitle(server) {
    return normalizeText(server?.title || server?.name) || 'Server';
  }

  function getQualityTitle(quality, index) {
    let title = normalizeText(quality?.title || quality?.name);
    if (!title || title.toLowerCase() === 'unknown') {
      const firstServerTitle = normalizeText(quality?.serverList?.[0]?.title || quality?.serverList?.[0]?.name);
      if (firstServerTitle) title = firstServerTitle;
    }
    return title || `Quality ${index + 1}`;
  }

  function isDirectPlayable(url) {
    return url.match(/\.(mp4|webm|ogg|m3u8)(\?|$)/i) !== null;
  }

  function saveCurrentEpisodeToHistory() {
    if (!currentEpisodeData) return;
    
    saveWatchHistory({
      episodeId: currentEpisodeData.episodeId || slug,
      animeId: currentEpisodeData.animeId,
      animeTitle: currentEpisodeData.animeTitle || currentEpisodeData.animeId,
      episodeTitle: currentEpisodeData.title,
      episode: currentEpisodeData.episode || extractEpisodeNumber(currentEpisodeData.title),
      poster: currentEpisodeData.poster || '/img/placeholder.svg',
      progress: 0
    });
  }

  function extractEpisodeNumber(title) {
    const match = title?.match(/episode\s*(\d+)/i);
    return match ? match[1] : '?';
  }

  function playDirect(url, title, resumePosition = 0) {
    const wrap = document.getElementById('playerWrap');
    wrap.innerHTML = '<div id="artplayer-app"></div>';

    const isHLS = url.includes('.m3u8');

    if (artInstance) { try { artInstance.destroy(); } catch(e) {} }

    artInstance = new Artplayer({
      container: '#artplayer-app',
      url,
      title: title || '',
      volume: 0.8,
      autoplay: true,
      pip: true,
      screenshot: true,
      setting: true,
      playbackRate: true,
      aspectRatio: true,
      fullscreen: true,
      fullscreenWeb: true,
      miniProgressBar: true,
      theme: '#FFE500',
      customType: isHLS ? {
        m3u8: function(video, url) {
          if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
          } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
          }
        }
      } : {},
    });

    if (resumePosition > 5) {
      let resumed = false;
      artInstance.on('video:canplay', () => {
        if (resumed) return;
        resumed = true;
        artInstance.seek = resumePosition;
      });
    }

    let bufferingTimer = null;
    let bufferingStartedAt = 0;
    let autoSwitchCount = 0;

    function clearBufferingTimer() {
      if (!bufferingTimer) return;
      clearTimeout(bufferingTimer);
      bufferingTimer = null;
      bufferingStartedAt = 0;
    }

    function tryAutoSwitch(reason) {
      if (autoSwitchCount >= 2) return;
      autoSwitchCount += 1;

      const activeBtn = document.querySelector('.server-btn.active');
      const activeContainer = activeBtn?.closest('.quality-servers') || document.querySelector('.quality-servers.active');
      const candidates = Array.from(activeContainer?.querySelectorAll('.server-btn') || []).filter(b => b !== activeBtn);
      const nextBtn = candidates[0];

      if (!nextBtn) {
        showResumeToast('Server lagi lambat/blocked. Coba ganti server atau turunin kualitas.');
        return;
      }

      const currentTime = Math.max(0, Math.floor(artInstance?.currentTime || 0));
      const nextServerId = nextBtn.getAttribute('data-server-id');
      if (!nextServerId) return;

      showResumeToast(`Buffering (${reason}). Pindah server otomatis...`);
      loadServerById(nextServerId, nextBtn, currentTime);
    }

    function onBuffering(reason) {
      if (bufferingTimer) return;
      bufferingStartedAt = Date.now();
      bufferingTimer = setTimeout(() => {
        bufferingTimer = null;
        const elapsed = Date.now() - bufferingStartedAt;
        bufferingStartedAt = 0;
        if (elapsed >= 8000) tryAutoSwitch(reason);
      }, 8000);
    }

    function saveCurrentPosition() {
      if (!currentEpisodeData || !artInstance.duration) return;
      const progress = Math.floor((artInstance.currentTime / artInstance.duration) * 100);
      updateWatchProgress(
        currentEpisodeData.episodeId || slug,
        progress,
        artInstance.currentTime,
        window._currentServerId
      );
    }

    artInstance.on('video:timeupdate', () => {
      if (!currentEpisodeData || !artInstance.duration) return;
      if (_saveProgressTimer) return;
      _saveProgressTimer = setTimeout(() => {
        _saveProgressTimer = null;
        saveCurrentPosition();
      }, 5000);
    });

    artInstance.on('video:pause', () => {
      if (_saveProgressTimer) { clearTimeout(_saveProgressTimer); _saveProgressTimer = null; }
      saveCurrentPosition();
    });

    artInstance.on('video:ended', () => {
      if (_saveProgressTimer) { clearTimeout(_saveProgressTimer); _saveProgressTimer = null; }
      saveCurrentPosition();
    });

    artInstance.on('video:play', () => {
      saveCurrentEpisodeToHistory();
    });

    artInstance.on('video:waiting', () => onBuffering('waiting'));
    artInstance.on('video:stalled', () => onBuffering('stalled'));
    artInstance.on('video:canplay', clearBufferingTimer);
    artInstance.on('video:playing', clearBufferingTimer);
    artInstance.on('video:error', () => {
      clearBufferingTimer();
      tryAutoSwitch('error');
    });
  }

  function playIframe(url) {
    const wrap = document.getElementById('playerWrap');
    wrap.innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay; fullscreen" style="width:100%;height:100%;border:none;"></iframe>`;
  }

  async function loadServerById(serverId, btn, resumePosition = 0) {
    if (!serverId) return;
    document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    window._currentServerId = serverId;

    const qualityTitle = btn?.getAttribute('data-quality-title');
    const serverTitle = btn?.getAttribute('data-server-title');
    if (qualityTitle && serverTitle) saveLastChoice(qualityTitle, serverTitle);

    const wrap = document.getElementById('playerWrap');
    wrap.innerHTML = '<div class="player-placeholder"><div class="spinner" style="border-color: var(--color-white); border-top-color: var(--color-primary);"></div><span>Mengambil link stream...</span></div>';

    try {
      const res  = await fetch(`${API}/api/server/${serverId}`);
      const json = await res.json();
      const url  = json.data?.url || json.data?.streamUrl || json.data?.src || '';

      if (!url) {
        wrap.innerHTML = '<div class="player-placeholder"><span style="color: var(--color-secondary);"> URL tidak tersedia</span></div>';
        return;
      }

      const epTitle = document.getElementById('epTitle')?.textContent?.trim() || '';

      if (isDirectPlayable(url)) {
        playDirect(url, epTitle, resumePosition);
      } else {
        playIframe(url);
      }
    } catch (err) {
      wrap.innerHTML = `<div class="player-placeholder"><span style="color: var(--color-secondary);"> ${err.message}</span></div>`;
    }
  }

  function saveOnLeave() {
    if (!artInstance || !currentEpisodeData || !artInstance.duration) return;
    const progress = Math.floor((artInstance.currentTime / artInstance.duration) * 100);
    const token = Auth.getToken();
    if (!token) return;
    const payload = JSON.stringify({
      video_slug:      currentEpisodeData.episodeId || slug,
      video_title:     window._currentVideoTitle || undefined,
      video_cover_url: window._currentVideoCover || undefined,
      watch_progress:  progress,
      last_position:   Math.floor(artInstance.currentTime),
      last_server_id:  window._currentServerId || undefined,
    });
    fetch('/api/user/history', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: payload,
      keepalive: true,
    }).catch(() => {});
  }

  window.addEventListener('beforeunload', saveOnLeave);

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) saveOnLeave();
  });

  function showResumeToast(message) {
    const toast = document.createElement('div');
    toast.innerHTML = `▶ ${message}`;
    toast.style.cssText = `
      position:fixed; bottom:2rem; left:50%; transform:translateX(-50%);
      background:var(--color-primary); color:var(--color-black);
      padding:var(--space-4) var(--space-6);
      font-family:var(--font-mono); font-size:var(--text-sm); font-weight:700;
      z-index:9999; border:var(--border-thick) solid var(--color-border);
      box-shadow:var(--shadow-xl); animation:fadeInUp .3s ease;
    `;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity='0'; toast.style.transition='opacity .4s'; setTimeout(()=>toast.remove(),400); }, 3000);
  }

  const _style = document.createElement('style');
  _style.textContent = `@keyframes fadeInUp { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }`;
  document.head.appendChild(_style);

  loadEpisode();
</script>
</body>
</html>
