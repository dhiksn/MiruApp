<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genre  MiruApp</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icon/apple-touch-icon.png" />
  <link rel="manifest" href="/icon/site.webmanifest" />
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">MIRUAPP</a>
  <ul class="navbar-nav">
    <li><a href="/">Home</a></li>
    <li><a href="/ongoing">Ongoing</a></li>
    <li><a href="/movies">Movies</a></li>
    <li><a href="/schedule">Jadwal</a></li>
    <li><a href="/batch">Batch</a></li>
    <li><a href="/daftar-anime">Daftar Anime</a></li>
  </ul>
  <div class="navbar-right">
    <button class="navbar-search-icon" id="searchBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
    <div id="navAuth"></div>
  </div>
</nav>

<!-- Search Modal -->
<div class="search-modal" id="searchModal">
  <div class="search-modal-overlay" id="searchOverlay"></div>
  <div class="search-modal-content">
    <button class="search-modal-close" id="searchCloseBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="search-modal-input-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="modalSearch" placeholder="Cari anime...">
      <button class="search-modal-submit" id="modalSearchSubmit">Cari</button>
    </div>
  </div>
</div>

<div class="page-header">
  <h1>Genre: <span id="genreTitle">...</span></h1>
  <p>Daftar anime berdasarkan genre ini</p>
</div>

<div class="container">
  <!-- Breadcrumb -->
  <nav style="font-family:var(--font-mono);font-size:var(--text-sm);color:var(--color-secondary);padding:var(--space-3) 0 0;display:flex;gap:var(--space-2);align-items:center">
    <a href="/" style="color:var(--color-secondary);transition:all var(--duration-fast) var(--ease-snap)" onmouseover="this.style.color='var(--color-black)'" onmouseout="this.style.color='var(--color-secondary)'">Home</a>
    <span>/</span>
    <a href="/genres" style="color:var(--color-secondary);transition:all var(--duration-fast) var(--ease-snap)" onmouseover="this.style.color='var(--color-black)'" onmouseout="this.style.color='var(--color-secondary)'">Genre</a>
    <span>/</span>
    <span id="breadcrumbGenre" style="color:var(--color-black);font-weight:700">...</span>
  </nav>
  <section class="section">
    <div id="grid" class="anime-grid"></div>
    <div id="pagination" class="pagination"></div>
  </section>
</div>

<footer><p>MiruApp Wrapper &amp; UI &copy; 2024</p></footer>

<script src="/js/helpers.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/search-modal.js"></script>
<script>
  initNavSearch();
  renderAuthNav();
  const params    = new URLSearchParams(location.search);
  // Support both /genres/:slug (path) and /genre?slug= (legacy)
  const pathSlug  = location.pathname.split('/genres/')[1]?.split('/')[0] || '';
  const genreSlug = pathSlug || params.get('slug') || '';

  const genreLabel = genreSlug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  document.getElementById('genreTitle').textContent = genreLabel;
  document.getElementById('breadcrumbGenre').textContent = genreLabel;
  document.title = `Genre: ${genreLabel}  MiruApp`;

  async function loadPage(page) {
    if (!genreSlug) {
      document.getElementById('grid').innerHTML = emptyHTML('', 'Genre tidak ditemukan');
      return;
    }
    const grid = document.getElementById('grid');
    grid.innerHTML = loadingHTML();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    try {
      const res  = await fetch(`${API}/api/genre/${genreSlug}?page=${page}`);
      const json = await res.json();
      const list = json.data?.animeList || [];
      grid.innerHTML = list.length ? list.map(animeCard).join('') : emptyHTML();
      let hasNext = list.length >= 10;
      if (hasNext) {
        hasNext = await checkHasNext(`${API}/api/genre/${genreSlug}`, page, (j) => j.data?.animeList || []);
      }
      renderPagination('pagination', page, hasNext, 'loadPage');
    } catch (err) {
      grid.innerHTML = errorHTML(err.message);
    }
  }

  loadPage(parseInt(params.get('page')) || 1);
</script>
</body>
</html>
