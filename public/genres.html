<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genre Anime  MiruApp</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icon/apple-touch-icon.png" />
  <link rel="manifest" href="/icon/site.webmanifest" />
  <style>
    .genre-section {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: var(--space-4);
    }
    .genre-card {
      background: var(--color-white);
      border: var(--border-thick) solid var(--color-border);
      box-shadow: var(--shadow-sm);
      padding: var(--space-5);
      text-align: center;
      cursor: pointer;
      transition: transform var(--duration-fast) var(--ease-snap), box-shadow var(--duration-fast) var(--ease-snap), background var(--duration-fast) var(--ease-snap);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
    }
    .genre-card:hover {
      background: var(--color-primary);
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
    }
    .genre-card-name {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: 700;
      text-transform: uppercase;
      color: var(--color-black);
    }
    .genre-icon {
      font-size: var(--text-3xl);
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">MIRUAPP</a>
  <ul class="navbar-nav">
    <li><a href="/">Home</a></li>
    <li><a href="/ongoing">Ongoing</a></li>
    <li><a href="/movies">Movies</a></li>
    <li><a href="/schedule">Jadwal</a></li>
    <li><a href="/batch">Batch</a></li>
    <li><a href="/daftar-anime">Daftar Anime</a></li>
  </ul>
  <div class="navbar-right">
    <button class="navbar-search-icon" id="searchBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
    <div id="navAuth"></div>
  </div>
</nav>

<!-- Search Modal -->
<div class="search-modal" id="searchModal">
  <div class="search-modal-overlay" id="searchOverlay"></div>
  <div class="search-modal-content">
    <button class="search-modal-close" id="searchCloseBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="search-modal-input-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="modalSearch" placeholder="Cari anime...">
      <button class="search-modal-submit" id="modalSearchSubmit">Cari</button>
    </div>
  </div>
</div>

<div class="page-header">
  <h1>Genre <span>Anime</span></h1>
  <p>Jelajahi anime berdasarkan genre favorit</p>
</div>

<div class="container">
  <section class="section">
    <div id="genreGrid" class="genre-section">
      <div class="loading-overlay"><div class="spinner"></div><span>Memuat genre...</span></div>
    </div>
  </section>
</div>

<footer><p>MiruApp Wrapper & UI &copy; 2024</p></footer>

<script src="/js/helpers.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/search-modal.js"></script>
<script>
  initNavSearch();
  renderAuthNav();

  // Emoji per genre
  const GENRE_ICONS = {
    action:'⚔️', adventure:'🧭', comedy:'😂', drama:'🎭',
    fantasy:'🧙', horror:'👻', mystery:'🔍', romance:'❤️',
    'sci-fi':'🚀', 'slice-of-life':'☕', sports:'⚽', supernatural:'✨',
    thriller:'🔪', music:'🎵', historical:'📜', school:'🏫',
    isekai:'🌍', harem:'👯', ecchi:'😏', mecha:'🤖',
    psychological:'🧠', military:'🎖️', magic:'🪄', demons:'👹',
    vampire:'🧛', 'super-power':'💥', seinen:'👨', shounen:'👦',
    shoujo:'👧', josei:'👩', kids:'👶', parody:'🎭',
    'martial-arts':'🥋', game:'🎮', reincarnation:'🔄',
  };

  async function loadGenres() {
    const grid = document.getElementById('genreGrid');
    try {
      const res  = await fetch(`${API}/api/genres`);
      const json = await res.json();

      let list = [];
      const raw = json.data;
      if (raw?.genreList) {
        list = raw.genreList;
      } else if (Array.isArray(raw)) {
        raw.forEach(item => {
          if (item.genreList) list.push(...item.genreList);
          else if (item.genreId) list.push(item);
        });
      }

      // Deduplicate
      const seen = new Set();
      list = list.filter(g => {
        if (seen.has(g.genreId)) return false;
        seen.add(g.genreId); return true;
      });

      if (!list.length) {
        grid.innerHTML = emptyHTML('', 'Tidak ada genre');
        return;
      }

      grid.innerHTML = list.map(g => {
        const icon = GENRE_ICONS[g.genreId] || '📚';
        return `
          <div class="genre-card" onclick="goGenre('${g.genreId}')">
            <div class="genre-icon">${icon}</div>
            <div class="genre-card-name">${g.title}</div>
          </div>`;
      }).join('');

    } catch (err) {
      grid.innerHTML = errorHTML(err.message);
    }
  }

  loadGenres();
</script>
</body>
</html>
