<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiruApp  Home</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icon/apple-touch-icon.png" />
  <link rel="manifest" href="/icon/site.webmanifest" />
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">MIRUAPP</a>
  <ul class="navbar-nav">
    <li><a href="/" class="active">Home</a></li>
    <li><a href="/ongoing">Ongoing</a></li>
    <li><a href="/movies">Movies</a></li>
    <li><a href="/schedule">Jadwal</a></li>
    <li><a href="/batch">Batch</a></li>
    <li><a href="/daftar-anime">Daftar Anime</a></li>
  </ul>
  <div class="navbar-right">
    <button class="navbar-search-icon" id="searchBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
    <div id="navAuth"></div>
  </div>
</nav>

<!-- Search Modal -->
<div class="search-modal" id="searchModal">
  <div class="search-modal-overlay" id="searchOverlay"></div>
  <div class="search-modal-content">
    <button class="search-modal-close" id="searchCloseBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="search-modal-input-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="modalSearch" placeholder="Cari anime...">
      <button class="search-modal-submit" id="modalSearchSubmit">Cari</button>
    </div>
  </div>
</div>

<!--  TOP 10 SLIDER (paling atas)  -->
<div class="top10-wrapper">
  <div class="top10-header">
    <div class="section-title"> Top 10 Minggu Ini</div>
    <div class="slider-nav">
      <button class="slider-btn" onclick="slideTop10(-1)">&#8249;</button>
      <button class="slider-btn" onclick="slideTop10(1)">&#8250;</button>
    </div>
  </div>
  <div class="slider-track-outer">
    <div class="slider-track" id="top10Track">
      <div class="loading-overlay" style="width:100%;padding:3rem 0">
        <div class="spinner"></div>
      </div>
    </div>
  </div>
</div>

<!--  MAIN CONTENT  -->
<div class="container">

  <!-- CONTINUE WATCHING -->
  <section class="section" id="continueWatchingSection" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
      <div class="section-title" style="margin-bottom:0">Lanjutkan Menonton</div>
      <button onclick="clearContinueWatching()" class="page-btn">Hapus Semua</button>
    </div>
    <div id="continueWatchingGrid" class="anime-grid"></div>
  </section>

  <!-- RECENT EPISODES -->
  <section class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
      <div class="section-title" style="margin-bottom:0">Anime Terbaru</div>
      <a href="/recent" class="page-btn">View All</a>
    </div>
    <div id="recentGrid" class="episode-grid">
      <div class="loading-overlay"><div class="spinner"></div><span>Memuat data...</span></div>
    </div>
  </section>

  <!-- MOVIES -->
  <section class="section">
    <div class="section-title">Movie Terbaru</div>
    <div id="movieGrid" class="anime-grid">
      <div class="loading-overlay"><div class="spinner"></div></div>
    </div>
    <div style="text-align:center;margin-top:1rem">
      <a href="/movies" class="page-btn">Lihat Semua Movie</a>
    </div>
  </section>

</div>

<footer>
  <p>MiruApp Wrapper &copy; 2024  Data dari <a href="#">MiruApp</a></p>
</footer>

<script src="/js/helpers.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/search-modal.js"></script>
<script src="/js/modal.js"></script>
<script>
  initNavSearch();
  renderAuthNav();

  /*  Slider state  */
  let sliderIndex  = 0;
  let sliderTotal  = 0;
  let visibleCount = 5;

  function getVisible() {
    const w = window.innerWidth;
    if (w <= 560) return 3;
    if (w <= 900) return 4;
    return 6;
  }

  function slideTop10(dir) {
    visibleCount = getVisible();
    const maxIndex = Math.max(0, sliderTotal - visibleCount);
    sliderIndex = Math.min(Math.max(sliderIndex + dir, 0), maxIndex);

    const track     = document.getElementById('top10Track');
    const cardWidth = track.querySelector('.top10-card')?.offsetWidth || 0;
    const gap       = 24; // 1.5rem
    track.style.transform = `translateX(-${sliderIndex * (cardWidth + gap)}px)`;
  }

  window.addEventListener('resize', () => {
    visibleCount = getVisible();
    sliderIndex  = 0;
    const track  = document.getElementById('top10Track');
    if (track) track.style.transform = 'translateX(0)';
  });

  function rankClass(rank) {
    if (rank === 1) return 'rank-gold';
    if (rank === 2) return 'rank-silver';
    if (rank === 3) return 'rank-bronze';
    return '';
  }

  /*  Load home data  */
  async function loadHome() {
    try {
      const res  = await fetch(`${API}/api/home`);
      const json = await res.json();
      const data = json.data || {};

      /* Top 10 slider */
      const top10 = data.top10?.animeList || [];
      sliderTotal  = top10.length;
      const track  = document.getElementById('top10Track');
      track.innerHTML = top10.length
        ? top10.map(a => `
            <div class="top10-card" onclick="MiruApp('${a.animeId || ''}')">
              <div class="top10-card-thumb">
                <img src="${a.poster || '/img/placeholder.svg'}" alt="${a.title}"
                     loading="lazy" onerror="this.src='/img/placeholder.svg'"/>
                <span class="top10-rank">
                  <span class="rank-top">TOP</span>
                  <span class="rank-num">${a.rank}</span>
                </span>
                ${a.score && a.score !== '0'
                  ? `<span class="top10-score">&#11088; ${a.score}</span>`
                  : ''}
                <div class="top10-card-title">${a.title}</div>
              </div>
            </div>`).join('')
        : emptyHTML('', 'Tidak ada data');

      /* Recent */
      const recent   = data.recent?.animeList || [];
      const recentEl = document.getElementById('recentGrid');
      recentEl.innerHTML = recent.length
        ? recent.map(recentCard).join('')
        : emptyHTML('', 'Tidak ada episode terbaru');

      /* Movies */
      const movies   = data.movie?.animeList || [];
      const movieEl  = document.getElementById('movieGrid');
      movieEl.innerHTML = movies.length
        ? movies.slice(0, 12).map(a => {
            const genres = (a.genreList || []).slice(0,2).map(g => g.title).join(', ');
            const score  = a.score && a.score !== '0' && a.score !== '' ? a.score : null;
            return `
            <div class="anime-card" onclick="MiruApp('${a.animeId || ''}')">
              <div class="anime-card-thumb">
                <img src="${a.poster || '/img/placeholder.svg'}" alt="${a.title}"
                     loading="lazy" onerror="this.src='/img/placeholder.svg'"/>
                <span class="anime-card-badge">Movie</span>
                ${score ? `<span class="anime-card-badge" style="left:auto;right:1rem;background:var(--color-white)">&#11088; ${score}</span>` : ''}
              </div>
              <div class="anime-card-info">
                <div class="anime-card-title">${a.title}</div>
                <div class="anime-card-meta">${genres}</div>
              </div>
            </div>`;
          }).join('')
        : emptyHTML('', 'Tidak ada movie');

    } catch (err) {
      document.getElementById('top10Track').innerHTML  = errorHTML(err.message);
      document.getElementById('recentGrid').innerHTML  = errorHTML(err.message);
      document.getElementById('movieGrid').innerHTML   = errorHTML(err.message);
    }
  }

  loadHome();

  /*  CONTINUE WATCHING LOGIC  */
  async function loadContinueWatching() {
    if (!Auth.isLoggedIn()) return; // sembunyikan jika belum login

    try {
      const res  = await authFetch('/api/user/history');
      const json = await res.json();
      if (!json.success || !json.data?.length) return;

      document.getElementById('continueWatchingSection').style.display = 'block';
      const grid   = document.getElementById('continueWatchingGrid');
      const recent = json.data.slice(0, 6); // 6 terakhir

      grid.innerHTML = recent.map(item => {
        const progress = item.watch_progress || 0;
        const date = item.last_watched
          ? new Date(item.last_watched).toLocaleDateString('id-ID', { day:'numeric', month:'short' })
          : '';
        return `
          <div class="anime-card" onclick="window.location.href='/episode?slug=${item.video_slug}'">
            <div class="anime-card-thumb">
              <img src="${item.video_cover_url || '/img/placeholder.svg'}"
                   alt="${item.video_title || ''}"
                   loading="lazy" onerror="this.src='/img/placeholder.svg'"/>
              ${progress > 0 ? `
                <span class="anime-card-badge" style="left:auto;right:1rem;background:var(--color-white)">
                  ${progress}%
                </span>` : ''}
              ${progress > 0 ? `
                <div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,.2)">
                  <div style="height:100%;background:var(--color-primary);width:${progress}%"></div>
                </div>` : ''}
            </div>
            <div class="anime-card-info">
              <div class="anime-card-title">${item.video_title || item.video_slug}</div>
              <div class="anime-card-meta">${date}</div>
            </div>
          </div>`;
      }).join('');

    } catch (err) {
      console.warn('loadContinueWatching failed:', err);
    }
  }

  async function clearContinueWatching() {
    openConfirmModal({
        topBarLabel: "KONFIRMASI HAPUS",
        title: "Hapus",
        titleHighlight: "Semua Riwayat",
        description: "Semua item riwayat tontonanmu akan dihapus permanen. Aksi ini tidak bisa dibatalkan.",
        cancelText: "BATAL",
        confirmText: "YA HAPUS",
        onConfirm: async () => {
            await authFetch('/api/user/history', { method: 'DELETE' });
            document.getElementById('continueWatchingSection').style.display = 'none';
        }
    });
  }

  // Load continue watching on page load
  loadContinueWatching();
</script>
</body>
</html>
