<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar Anime - MiruApp</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icon/apple-touch-icon.png" />
  <link rel="manifest" href="/icon/site.webmanifest" />
  <style>
    /* -- FILTER PANEL -- */
    .filter-panel {
      background: var(--color-white);
      border: var(--border-thick) solid var(--color-border);
      box-shadow: var(--shadow-md);
      padding: var(--space-4) var(--space-6);
      margin-bottom: var(--space-6);
    }
    .filter-grid-top {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4) var(--space-6);
      padding-bottom: var(--space-4);
      border-bottom: 2px solid var(--color-muted);
      margin-bottom: var(--space-4);
    }
    .filter-group-title {
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: 900;
      color: var(--color-black);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: var(--space-2);
    }
    .filter-options {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
    }
    .filter-options-genre {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: var(--space-2);
      max-height: 140px;
      overflow-y: auto;
      padding-right: var(--space-2);
    }
    .filter-options-genre::-webkit-scrollbar { width: 6px; }
    .filter-options-genre::-webkit-scrollbar-thumb { background: var(--color-black); }

    /* Chip style (status, type, genre) */
    .filter-radio,
    .genre-option {
      display: inline-flex;
      align-items: center;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--color-black);
      opacity: 0.65;
      padding: var(--space-2) var(--space-3);
      border: 2px solid var(--color-border);
      background: var(--color-white);
      transition: background var(--duration-fast) var(--ease-snap),
                  box-shadow var(--duration-fast) var(--ease-snap),
                  opacity var(--duration-fast) var(--ease-snap);
      white-space: nowrap;
    }
    .filter-radio:hover,
    .genre-option:hover {
      opacity: 1;
      box-shadow: var(--shadow-sm);
    }
    .filter-radio input[type="radio"],
    .genre-option input[type="checkbox"] { display: none; }
    .radio-dot,
    .genre-dot { display: none; }
    .filter-radio:has(input:checked),
    .genre-option:has(input:checked) {
      background: var(--color-primary);
      opacity: 1;
      font-weight: 700;
      box-shadow: var(--shadow-sm);
    }
    .genre-option:has(input:checked) {
      background: var(--color-tertiary);
    }

    /* Sort tabs */
    .sort-tab {
      padding: var(--space-2) var(--space-4);
      border: 2px solid var(--color-border);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      background: var(--color-white);
      color: var(--color-black);
      opacity: 0.65;
      transition: background var(--duration-fast) var(--ease-snap), box-shadow var(--duration-fast) var(--ease-snap), opacity var(--duration-fast) var(--ease-snap);
    }
    .sort-tab:hover { opacity: 1; box-shadow: var(--shadow-sm); }
    .sort-tab.active {
      background: var(--color-primary);
      opacity: 1;
      box-shadow: var(--shadow-sm);
    }

    .filter-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: var(--space-4);
      padding-top: var(--space-4);
      border-top: 2px solid var(--color-muted);
    }
    .filter-search-btn {
      padding: var(--space-3) var(--space-8);
      background: var(--color-primary);
      color: var(--color-black);
      border: var(--border-thick) solid var(--color-border);
      box-shadow: var(--shadow-sm);
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: transform var(--duration-fast) var(--ease-snap), box-shadow var(--duration-fast) var(--ease-snap);
    }
    .filter-search-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
    }

    @media (max-width: 768px) {
      .filter-grid-top { grid-template-columns: 1fr; gap: var(--space-4); }
      .filter-options-genre { max-height: 180px; }
    }

    /* -- ALPHABET BAR -- */
    .alpha-section {
      margin-bottom: var(--space-6);
      background: var(--color-white);
      border: var(--border-thick) solid var(--color-border);
      box-shadow: var(--shadow-sm);
      padding: var(--space-4) var(--space-6);
      position: sticky;
      top: 72px;
      z-index: 10;
    }
    .alpha-bar {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }
    .alpha-btn {
      min-width: 34px;
      padding: var(--space-2) var(--space-3);
      text-align: center;
      background: var(--color-white);
      border: 2px solid var(--color-border);
      box-shadow: var(--shadow-sm);
      font-family: var(--font-display);
      font-size: var(--text-xs);
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--duration-fast) var(--ease-snap), box-shadow var(--duration-fast) var(--ease-snap);
      color: var(--color-black);
      opacity: 0.65;
      text-decoration: none;
    }
    .alpha-btn:hover { opacity: 1; box-shadow: var(--shadow-md); }
    .alpha-btn.active {
      background: var(--color-primary);
      color: var(--color-black);
      opacity: 1;
      box-shadow: var(--shadow-sm);
    }
    .result-count {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--color-black);
      opacity: 0.55;
      margin-top: var(--space-3);
      padding-top: var(--space-3);
      border-top: 2px solid var(--color-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* -- LIST -- */
    .anime-group {
      margin-bottom: var(--space-8);
      scroll-margin-top: 160px;
    }
    .group-header {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 900;
      text-transform: uppercase;
      color: var(--color-black);
      background: var(--color-primary);
      display: inline-block;
      padding: var(--space-2) var(--space-4);
      border: var(--border-thick) solid var(--color-border);
      box-shadow: var(--shadow-md);
      margin-bottom: var(--space-4);
    }
    .anime-list-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-3);
    }
    .anime-list-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border: var(--border-thick) solid var(--color-border);
      box-shadow: var(--shadow-sm);
      background: var(--color-white);
      cursor: pointer;
      transition: transform var(--duration-fast) var(--ease-snap), box-shadow var(--duration-fast) var(--ease-snap);
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--color-black);
      font-weight: 600;
    }
    .anime-list-item:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
      background: var(--color-muted);
    }
    .anime-list-item::before {
      content: '';
      width: 10px;
      height: 10px;
      background: var(--color-black);
      flex-shrink: 0;
    }

  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">MIRUAPP</a>
  <ul class="navbar-nav">
    <li><a href="/">Home</a></li>
    <li><a href="/ongoing">Ongoing</a></li>
    <li><a href="/movies">Movies</a></li>
    <li><a href="/schedule">Jadwal</a></li>
    <li><a href="/batch">Batch</a></li>
    <li><a href="/daftar-anime" class="active">Daftar Anime</a></li>
  </ul>
  <div class="navbar-right">
    <button class="navbar-search-icon" id="searchBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
    <div id="navAuth"></div>
  </div>
</nav>

<!-- Search Modal -->
<div class="search-modal" id="searchModal">
  <div class="search-modal-overlay" id="searchOverlay"></div>
  <div class="search-modal-content">
    <button class="search-modal-close" id="searchCloseBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="search-modal-input-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="modalSearch" placeholder="Cari anime...">
      <button class="search-modal-submit" id="modalSearchSubmit">Cari</button>
    </div>
  </div>
</div>

<div class="page-header">
  <h1>Daftar <span>Semua Anime</span></h1>
  <p>Seluruh koleksi anime yang tersedia di MiruApp</p>
</div>

<div class="container">
  <section class="section">

    <!-- FILTER PANEL -->
    <div class="filter-panel">
      <div class="filter-grid-top">
        <div class="filter-group">
          <div class="filter-group-title">Status</div>
          <div class="filter-options">
            <label class="filter-radio">
              <input type="radio" name="status" value="" checked>
              <div class="radio-dot"></div><span>All</span>
            </label>
            <label class="filter-radio">
              <input type="radio" name="status" value="Ongoing">
              <div class="radio-dot"></div><span>Ongoing</span>
            </label>
            <label class="filter-radio">
              <input type="radio" name="status" value="Completed">
              <div class="radio-dot"></div><span>Completed</span>
            </label>
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-group-title">Type</div>
          <div class="filter-options">
            <label class="filter-radio">
              <input type="radio" name="type" value="" checked>
              <div class="radio-dot"></div><span>All</span>
            </label>
            <label class="filter-radio">
              <input type="radio" name="type" value="TV">
              <div class="radio-dot"></div><span>TV</span>
            </label>
            <label class="filter-radio">
              <input type="radio" name="type" value="OVA">
              <div class="radio-dot"></div><span>OVA</span>
            </label>
            <label class="filter-radio">
              <input type="radio" name="type" value="ONA">
              <div class="radio-dot"></div><span>ONA</span>
            </label>
            <label class="filter-radio">
              <input type="radio" name="type" value="Special">
              <div class="radio-dot"></div><span>Special</span>
            </label>
            <label class="filter-radio">
              <input type="radio" name="type" value="Movie">
              <div class="radio-dot"></div><span>Movie</span>
            </label>
          </div>
        </div>

        <div class="filter-group">
          <div class="filter-group-title">Urutkan</div>
          <div class="filter-options" id="sortTabs">
            <div class="sort-tab active" data-sort="az" onclick="setSort('az', this)">A-Z</div>
            <div class="sort-tab" data-sort="za" onclick="setSort('za', this)">Z-A</div>
          </div>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-group-title">Genre</div>
        <div class="filter-options filter-options-genre" id="genreOptions">
          <div class="loading-overlay" style="padding:.5rem"><div class="spinner" style="width:16px;height:16px"></div></div>
        </div>
      </div>

      <div class="filter-actions">
        <button class="filter-search-btn" onclick="applyFilter()">Terapkan Filter</button>
      </div>
    </div>

    <!-- ALPHABET BAR -->
    <div class="alpha-section" id="alphaSection" style="display:none">
      <div class="alpha-bar" id="alphaBar"></div>
      <div class="result-count" id="resultCount"></div>
    </div>

    <!-- CONTENT -->
    <div id="listContent">
      <div class="loading-overlay"><div class="spinner"></div><span>Memuat daftar anime...</span></div>
    </div>

  </section>
</div>

<footer><p>MiruApp Wrapper &amp; UI &copy; 2024</p></footer>

<script src="/js/helpers.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/search-modal.js"></script>
<script>
  renderAuthNav();

  let allGroups  = [];   // raw dari API: [{ startWith, animeList[] }]
  let allFlat    = [];   // flat list semua anime
  let currentSort = 'az';
  let genreList  = [];

  /* -- Load genres -- */
  async function loadGenres() {
    try {
      const res  = await fetch(`${API}/api/genres`);
      const json = await res.json();
      genreList  = json.data?.genreList || [];
      const el   = document.getElementById('genreOptions');
      el.innerHTML = genreList.map(g => `
        <label class="genre-option">
          <input type="checkbox" name="genre" value="${g.genreId}">
          <div class="genre-dot"></div>
          <span>${g.title}</span>
        </label>`).join('');
    } catch (e) {
      document.getElementById('genreOptions').innerHTML =
        '<span style="font-size:.8rem;color:var(--color-secondary)">Gagal memuat genre</span>';
    }
  }

  /* -- Load list -- */
  async function loadList() {
    try {
      const res  = await fetch(`${API}/api/list`);
      const json = await res.json();
      allGroups  = json.data?.list || [];
      allFlat    = allGroups.flatMap(g => g.animeList || []);
      applyFilter();
    } catch (err) {
      document.getElementById('listContent').innerHTML = errorHTML(err.message);
    }
  }

  /* -- Sort -- */
  function setSort(val, el) {
    currentSort = val;
    document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  function groupId(key) {
    return 'group-' + encodeURIComponent(key);
  }

  function getScrollOffset() {
    const nav = document.querySelector('.navbar');
    const section = document.getElementById('alphaSection');
    return (nav?.offsetHeight || 72) + (section?.offsetHeight || 0) + 12;
  }

  function setAlphaActive(letter) {
    document.querySelectorAll('.alpha-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.letter === letter);
    });
  }

  function scrollToGroup(letter) {
    setAlphaActive(letter);
    if (letter === 'ALL') {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }
    const el = document.getElementById(groupId(letter));
    if (!el) return;
    const top = el.getBoundingClientRect().top + window.scrollY - getScrollOffset();
    window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
  }

  /* -- Apply filter -- */
  function applyFilter() {
    const status = document.querySelector('input[name="status"]:checked')?.value || '';
    const type   = document.querySelector('input[name="type"]:checked')?.value || '';
    const genres = [...document.querySelectorAll('input[name="genre"]:checked')].map(i => i.value);

    // Filter dari flat list
    // Note: list API tidak punya status/type/genre per item,
    // jadi filter ini bekerja sebagai navigasi ke halaman yang sesuai
    // Kalau ada filter aktif ? redirect ke halaman yang tepat
    if (status === 'Ongoing' && !type && !genres.length) {
      window.location.href = '/ongoing'; return;
    }
    if (status === 'Completed' && !type && !genres.length) {
      window.location.href = '/completed'; return;
    }
    if (type === 'Movie' && !status && !genres.length) {
      window.location.href = '/movies'; return;
    }
    if (genres.length === 1 && !status && !type) {
      window.location.href = `/genres/${genres[0]}`; return;
    }

    // Sort
    let sorted = [...allFlat];
    if (currentSort === 'az') sorted.sort((a, b) => a.title.localeCompare(b.title));
    if (currentSort === 'za') sorted.sort((a, b) => b.title.localeCompare(a.title));

    // Re-group by first letter
    const grouped = {};
    sorted.forEach(a => {
      const key = a.title[0]?.toUpperCase() || '#';
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(a);
    });

    const keys = Object.keys(grouped).sort();

    // Alphabet bar
    document.getElementById('alphaSection').style.display = 'block';
    const alphaBar = document.getElementById('alphaBar');
    alphaBar.innerHTML = `
      <a class="alpha-btn active" href="#" data-letter="ALL">ALL</a>
      ${keys.map(k => `
        <a class="alpha-btn" href="#" data-letter="${k}">${k}</a>`).join('')}`;
    alphaBar.querySelectorAll('.alpha-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        scrollToGroup(btn.dataset.letter);
      });
    });

    // Result count
    document.getElementById('resultCount').textContent =
      `${sorted.length} anime ditemukan`;

    // Render
    document.getElementById('listContent').innerHTML = keys.map(k => `
      <div class="anime-group" id="${groupId(k)}">
        <div class="group-header">${k}</div>
        <div class="anime-list-grid">
          ${grouped[k].map(a => `
            <div class="anime-list-item" onclick="MiruApp('${a.animeId}')">
              ${a.title}
            </div>`).join('')}
        </div>
      </div>`).join('');
  }

  loadGenres();
  loadList();
</script>
</body>
</html>
