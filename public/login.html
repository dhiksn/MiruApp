<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIRUAPP — Masuk</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Archivo:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Archivo', sans-serif;
            background: #f0ede6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 2rem 1rem;
        }

        /* Logo */
        .logo {
            background: #FFE500;
            border: 3px solid #1a1a1a;
            box-shadow: 4px 4px 0 #1a1a1a;
            padding: 8px 22px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 800;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #1a1a1a;
            text-decoration: none;
        }

        /* Card */
        .auth-card {
            background: #fff;
            border: 3px solid #1a1a1a;
            box-shadow: 7px 7px 0 #1a1a1a;
            max-width: 420px;
            width: 100%;
            overflow: hidden;
        }

        /* Card Top Bar */
        .card-top-bar {
            background: #FFE500;
            border-bottom: 3px solid #1a1a1a;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-top-bar i {
            font-size: 16px;
            color: #1a1a1a;
        }

        .card-top-bar span {
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #1a1a1a;
        }

        /* Card Body */
        .card-body {
            padding: 1.75rem 1.5rem 1.5rem;
        }

        /* Title */
        .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 800;
            font-size: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        /* Subtitle */
        .card-subtitle {
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            font-size: 11px;
            letter-spacing: 0.5px;
            color: #1a1a1a;
            opacity: 0.5;
            margin-bottom: 1.5rem;
        }

        /* Form Fields */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            font-family: 'Archivo', sans-serif;
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #1a1a1a;
            display: block;
            margin-bottom: 6px;
        }

        .form-input-wrap {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 2.5px solid #1a1a1a;
            background: #fff;
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            font-size: 13px;
            color: #1a1a1a;
            outline: none;
        }

        .form-input::placeholder {
            color: rgba(26, 26, 26, 0.3);
        }

        .form-input:focus {
            background: #FFFBE6;
            box-shadow: 3px 3px 0 #1a1a1a;
        }

        .form-input.error {
            border-color: #FF3B00;
            box-shadow: 3px 3px 0 #FF3B00;
        }

        /* Password Toggle */
        .toggle-password-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            opacity: 0.4;
            transition: opacity 0.2s ease;
        }

        .toggle-password-btn:hover {
            opacity: 1;
        }

        .toggle-password-btn i {
            font-size: 16px;
            color: #1a1a1a;
        }

        /* Divider */
        .form-divider {
            border-top: 2.5px solid #1a1a1a;
            margin: 1.25rem 0;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 0.9rem;
            background: #1a1a1a;
            border: 2.5px solid #1a1a1a;
            box-shadow: 4px 4px 0 #FFE500;
            color: #FFE500;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 1rem;
        }

        .submit-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #FFE500;
        }

        .submit-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #FFE500;
        }

        .submit-btn.success {
            background: #00A86B;
            border-color: #00A86B;
            box-shadow: 4px 4px 0 #1a1a1a;
            color: #fff;
        }

        /* Footer Text */
        .card-footer-text {
            text-align: center;
            font-family: 'Archivo', sans-serif;
            font-size: 12px;
            color: #1a1a1a;
            opacity: 0.55;
        }

        .card-footer-text a {
            background: #FFE500;
            padding: 0 4px;
            font-weight: 700;
            color: #1a1a1a;
            text-decoration: none;
            transition: background 0.12s ease, color 0.12s ease;
        }

        .card-footer-text a:hover {
            background: #FF3B00;
            color: #fff;
        }

        /* Back Link */
        .back-link {
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #1a1a1a;
            opacity: 0.4;
            text-decoration: none;
            transition: opacity 0.12s ease;
        }

        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Logo -->
    <a href="/" class="logo">MIRUAPP</a>

    <!-- Auth Card -->
    <div class="auth-card">
        <div class="card-top-bar">
            <i class="ti ti-login"></i>
            <span>MASUK AKUN</span>
        </div>

        <div class="card-body">
            <h1 class="card-title">MASUK</h1>
            <p class="card-subtitle">Selamat datang kembali</p>

            <form id="loginForm">
                <!-- Email -->
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="nama@email.com" autocomplete="email" />
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="form-input-wrap">
                        <input type="password" id="password" class="form-input" placeholder="Password kamu" autocomplete="current-password" />
                        <button type="button" class="toggle-password-btn" onclick="togglePassword('password', this)">
                            <i class="ti ti-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-divider"></div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn" id="submitBtn">
                    <i class="ti ti-login"></i>
                    MASUK
                </button>

                <!-- Footer -->
                <p class="card-footer-text">
                    Belum punya akun? <a href="/register">Daftar sekarang</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Back Link -->
    <a href="/" class="back-link">
        <i class="ti ti-arrow-left"></i>
        Kembali ke Beranda
    </a>

    <script>
        // Redirect if already logged in
        if (localStorage.getItem('auth_token')) {
            window.location.href = '/';
        }

        // Toggle password visibility
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('ti-eye');
                icon.classList.add('ti-eye-off');
            } else {
                input.type = 'password';
                icon.classList.remove('ti-eye-off');
                icon.classList.add('ti-eye');
            }
        }

        // Clear errors from inputs
        function clearErrors() {
            document.querySelectorAll('.form-input').forEach(input => {
                input.classList.remove('error');
            });
        }

        // Add error class to input
        function setError(inputId) {
            document.getElementById(inputId).classList.add('error');
        }

        // Handle form submit
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');

            let hasError = false;

            // Validate fields
            if (!email) {
                setError('email');
                hasError = true;
            }
            if (!password) {
                setError('password');
                hasError = true;
            }

            if (hasError) {
                return;
            }

            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="ti ti-loader-2" style="animation: spin 1s linear infinite;"></i> LOADING...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();

                if (data.success) {
                    submitBtn.classList.add('success');
                    submitBtn.innerHTML = '<i class="ti ti-check"></i> BERHASIL';
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('auth_user', JSON.stringify(data.user));
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    alert(data.message || 'Login gagal');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="ti ti-login"></i> MASUK';
                }
            } catch (err) {
                alert('Gagal terhubung ke server');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="ti ti-login"></i> MASUK';
            }
        });
    </script>
</body>
</html>
