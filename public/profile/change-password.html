<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiruApp — Ganti Password</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Archivo:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Archivo', sans-serif;
      background: #f0f0f0;
      min-height: calc(100vh - 72px);
    }

    .main-container {
      width: 100%;
      padding: 1.5rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .content-card {
      background: #fff;
      border: 3px solid #1a1a1a;
      box-shadow: 5px 5px 0 #1a1a1a;
      padding: 1.5rem;
      margin-bottom: 1.75rem;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      border: 3px solid #1a1a1a;
      box-shadow: 3px 3px 0 #1a1a1a;
      padding: 0.625rem 1rem;
      font-family: 'Archivo', sans-serif;
      font-weight: 900;
      font-size: 0.875rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 80ms ease, box-shadow 80ms ease, background 80ms ease;
      margin-bottom: 1.5rem;
    }

    .back-btn:hover {
      background: #FFE500;
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 #1a1a1a;
    }

    .back-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #1a1a1a;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 2rem;
      background: #FFE500;
      border: 3px solid #1a1a1a;
      box-shadow: 5px 5px 0 #1a1a1a;
      padding: 1.5rem;
    }
    .page-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      text-transform: uppercase;
      color: #1a1a1a;
    }
    .page-header p {
      font-family: 'DM Mono', monospace;
      font-size: 0.875rem;
      color: #1a1a1a;
      opacity: 0.8;
      margin-top: 0.375rem;
    }

    /* Form Groups */
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      font-family: 'Archivo', sans-serif;
      font-weight: 900;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #1a1a1a;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      display: block;
    }
    .form-input-wrapper {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #fff;
      border: 3px solid #1a1a1a;
      box-shadow: 4px 4px 0 #1a1a1a;
      padding: 0.75rem 1rem;
    }
    .form-input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Archivo', sans-serif;
      font-size: 1rem;
      color: #1a1a1a;
      background: transparent;
    }
    .form-input::placeholder {
      color: #666;
    }
    .toggle-password {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
    }
    .toggle-password i {
      font-size: 1.25rem;
      color: #1a1a1a;
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: 0.875rem;
      background: #FF3B00;
      border: 3px solid #1a1a1a;
      box-shadow: 4px 4px 0 #1a1a1a;
      color: #fff;
      font-family: 'Archivo', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: transform 80ms ease, box-shadow 80ms ease, background 80ms ease;
      margin-top: 1rem;
    }

    .submit-btn:hover {
      background: #d93200;
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #1a1a1a;
    }

    .submit-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #1a1a1a;
    }

    .submit-btn:disabled {
      background: #666;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/">MIRUAPP</a>
    <ul class="navbar-nav">
      <li><a href="/">Home</a></li>
      <li><a href="/ongoing">Ongoing</a></li>
      <li><a href="/movies">Movies</a></li>
      <li><a href="/schedule">Jadwal</a></li>
      <li><a href="/batch">Batch</a></li>
      <li><a href="/daftar-anime">Daftar Anime</a></li>
    </ul>
    <div class="navbar-right">
      <button class="navbar-search-icon" id="searchBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
      <div id="navAuth"></div>
    </div>
  </nav>

  <div class="search-modal" id="searchModal">
    <div class="search-modal-overlay" id="searchOverlay"></div>
    <div class="search-modal-content">
      <button class="search-modal-close" id="searchCloseBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="search-modal-input-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="modalSearch" placeholder="Cari anime...">
        <button class="search-modal-submit" id="modalSearchSubmit">Cari</button>
      </div>
    </div>
  </div>

  <div class="main-container">
    <button class="back-btn" onclick="window.location.href='/profile'">
      <i class="ti ti-arrow-left"></i>
      Kembali
    </button>

    <div class="page-header">
      <h1>Ganti Password</h1>
      <p>Ubah kata sandi akun kamu</p>
    </div>

    <div class="content-card">
      <form id="changePasswordForm">
        <div class="form-group">
          <label class="form-label">Password Lama</label>
          <div class="form-input-wrapper">
            <input type="password" id="oldPasswordInput" class="form-input" placeholder="Masukkan password lama">
            <button type="button" class="toggle-password" onclick="togglePassword('oldPasswordInput', this)">
              <i class="ti ti-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password Baru</label>
          <div class="form-input-wrapper">
            <input type="password" id="newPasswordInput" class="form-input" placeholder="Masukkan password baru">
            <button type="button" class="toggle-password" onclick="togglePassword('newPasswordInput', this)">
              <i class="ti ti-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Konfirmasi Password Baru</label>
          <div class="form-input-wrapper">
            <input type="password" id="confirmPasswordInput" class="form-input" placeholder="Masukkan ulang password baru">
            <button type="button" class="toggle-password" onclick="togglePassword('confirmPasswordInput', this)">
              <i class="ti ti-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Ganti Password
        </button>
      </form>
    </div>
  </div>

  <script src="/js/helpers.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/search-modal.js"></script>
  <script src="/js/modal.js"></script>
  <script>
    initNavSearch();
    renderAuthNav();

    if (!Auth.isLoggedIn()) window.location.href = '/login';

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '<i class="ti ti-eye-off"></i>';
      } else {
        input.type = 'password';
        btn.innerHTML = '<i class="ti ti-eye"></i>';
      }
    }

    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const oldPassword = document.getElementById('oldPasswordInput').value;
      const newPassword = document.getElementById('newPasswordInput').value;
      const confirmPassword = document.getElementById('confirmPasswordInput').value;
      const submitBtn = document.getElementById('submitBtn');

      if (!oldPassword || !newPassword || !confirmPassword) {
        alert('Semua kolom harus diisi!');
        return;
      }

      if (newPassword !== confirmPassword) {
        alert('Konfirmasi password baru tidak sesuai!');
        return;
      }

      if (newPassword.length < 6) {
        alert('Password baru harus memiliki setidaknya 6 karakter!');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = 'Menyimpan...';

      try {
        const updateRes = await authFetch('/api/auth/change-password', {
          method: 'POST',
          body: JSON.stringify({
            current_password: oldPassword,
            new_password: newPassword
          })
        });
        const updateJson = await updateRes.json();

        if (updateJson.success) {
          openConfirmModal({
            topBarLabel: 'Sukses',
            title: 'Password',
            titleHighlight: 'Berhasil Diubah',
            description: 'Password kamu telah berhasil diperbarui',
            cancelText: 'Tutup',
            confirmText: 'Kembali',
            onConfirm: () => window.location.href = '/profile'
          });
        } else {
          alert('Gagal mengubah password: ' + (updateJson.message || 'Unknown error'));
        }
      } catch (err) {
        alert('Terjadi kesalahan: ' + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Ganti Password';
      }
    });
  </script>
</body>
</html>
