<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiruApp — Riwayat Tontonan</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@800&display=swap" rel="stylesheet">
    
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Archivo', sans-serif;
            background: #fff;
            min-height: 100vh;
        }

        .main-container {
            width: 100%;
            padding: 1.5rem;
        }

        /* Header Row */
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-title i {
            font-size: 1.75rem;
            color: #1a1a1a;
        }

        .header-title h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            text-transform: uppercase;
            color: #1a1a1a;
        }

        .clear-all-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #FF3B00;
            border: 2.5px solid #1a1a1a;
            box-shadow: 3px 3px 0px #1a1a1a;
            padding: 0.75rem 1.25rem;
            color: #fff;
            font-family: 'Archivo', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }

        .clear-all-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px #1a1a1a;
        }

        .clear-all-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #1a1a1a;
        }

        /* Anime Card Grid */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        /* Anime Card */
        .anime-card {
            background: #fff;
            border: 2.5px solid #1a1a1a;
            box-shadow: 4px 4px 0px #1a1a1a;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .anime-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #1a1a1a;
        }

        /* Poster Area */
        .poster-area {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
            background: #f0f0f0;
        }

        .poster-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .poster-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e0e0e0;
        }

        .poster-placeholder i {
            font-size: 3rem;
            color: #1a1a1a;
            opacity: 0.5;
        }

        /* Delete Button */
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            background: #FF3B00;
            border: 2px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3;
            transition: transform 0.12s ease;
        }

        .delete-btn:hover {
            transform: scale(1.15);
        }

        .delete-btn i {
            color: #fff;
            font-size: 1.25rem;
        }

        /* Progress Bar */
        .progress-bar-container {
            position: absolute;
            bottom: 38px;
            left: 0;
            right: 0;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 2;
        }

        .progress-bar {
            height: 100%;
            background: #FFE500;
            width: 0%;
        }

        /* Overlay Bar */
        .overlay-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border-top: 2px solid #1a1a1a;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 2;
        }

        .episode-text {
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            font-size: 14px;
            color: #fff;
            opacity: 0.75;
        }

        .percentage-badge {
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            font-size: 14px;
            background: #FFE500;
            color: #1a1a1a;
            padding: 3px 8px;
        }

        /* Info Section */
        .info-section {
            border-top: 2.5px solid #1a1a1a;
            padding: 12px 14px;
        }

        .anime-title {
            font-family: 'Archivo', sans-serif;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            color: #1a1a1a;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .watch-date {
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            font-size: 12px;
            color: #FF3B00;
            margin-top: 6px;
        }

        /* Empty State & Loading */
        .empty-state,
        .loading-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 1rem;
        }

        .empty-state i,
        .loading-state i {
            font-size: 4rem;
            color: #1a1a1a;
            opacity: 0.5;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 800;
            font-size: 1.25rem;
            text-transform: uppercase;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            font-family: 'DM Mono', monospace;
            font-size: 0.9rem;
            color: #1a1a1a;
            opacity: 0.6;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #1a1a1a;
            border-top-color: #FFE500;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }


    </style>
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand" href="/">MIRUAPP</a>
        <ul class="navbar-nav">
            <li><a href="/">Home</a></li>
            <li><a href="/ongoing">Ongoing</a></li>
            <li><a href="/movies">Movies</a></li>
            <li><a href="/schedule">Jadwal</a></li>
            <li><a href="/batch">Batch</a></li>
            <li><a href="/daftar-anime">Daftar Anime</a></li>
        </ul>
        <div class="navbar-right">
            <button class="navbar-search-icon" id="searchBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <div id="navAuth"></div>
        </div>
    </nav>

    <!-- Search Modal -->
    <div class="search-modal" id="searchModal">
        <div class="search-modal-overlay" id="searchOverlay"></div>
        <div class="search-modal-content">
            <button class="search-modal-close" id="searchCloseBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="search-modal-input-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="modalSearch" placeholder="Cari anime...">
                <button class="search-modal-submit" id="modalSearchSubmit">Cari</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="header-row">
            <div class="header-title">
                <i class="ti ti-clock-hour-4"></i>
                <h1>Riwayat Tontonan</h1>
            </div>
            <button class="clear-all-btn" onclick="clearHistory()">
                <i class="ti ti-trash"></i>
                Hapus Semua
            </button>
        </div>

        <div id="historyList" class="anime-grid">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Memuat riwayat...</p>
            </div>
        </div>
    </div>

    <script src="/js/helpers.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/search-modal.js"></script>
    <script src="/js/modal.js"></script>
    <script>
        initNavSearch();
        renderAuthNav();

        // Redirect jika belum login
        if (!Auth.isLoggedIn()) window.location.href = '/login';

        async function loadHistory() {
            const listEl = document.getElementById('historyList');
            listEl.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Memuat riwayat...</p></div>';

            try {
                const res = await authFetch('/api/user/history');
                const json = await res.json();

                if (!json.success) throw new Error(json.message);

                const history = json.data || [];

                if (!history.length) {
                    listEl.innerHTML = `
                        <div class="empty-state">
                            <i class="ti ti-tv"></i>
                            <h3>Belum Ada Riwayat</h3>
                            <p>Mulai menonton anime untuk melihat riwayat di sini</p>
                        </div>`;
                    return;
                }

                function parseEpisodeNumber(item) {
                    // Try to extract from slug first
                    if (item.video_slug) {
                        const slugMatch = item.video_slug.match(/(?:episode|ep)[-_](\d+)/i);
                        if (slugMatch) return slugMatch[1];
                    }
                    // Then try to extract from title
                    if (item.video_title) {
                        const titleMatch = item.video_title.match(/(?:Episode|Ep)\.?\s*(\d+)/i);
                        if (titleMatch) return titleMatch[1];
                    }
                    // Default to 01 if nothing found
                    return '01';
                }

                listEl.innerHTML = history.map(item => {
                    const date = item.last_watched ? new Date(item.last_watched) : null;
                    const dateStr = date ? date.toLocaleDateString('id-ID', {
                        day: 'numeric', month: 'short', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    }) : '';
                    const progress = item.watch_progress || 0;
                    const episodeNumber = parseEpisodeNumber(item);

                    return `
                        <div class="anime-card" onclick="window.location.href='/episode?slug=${item.video_slug}'">
                            <div class="poster-area">
                                ${item.video_cover_url 
                                    ? `<img src="${item.video_cover_url}" alt="${item.video_title || ''}" onerror="this.parentElement.innerHTML='<div class=\\'poster-placeholder\\'><i class=\\'ti ti-tv\\'></i></div>'"/>`
                                    : `<div class="poster-placeholder"><i class="ti ti-tv"></i></div>`
                                }
                                
                                <button class="delete-btn" onclick="event.stopPropagation(); removeItem('${encodeURIComponent(item.video_slug)}')">
                                    <i class="ti ti-x"></i>
                                </button>

                                ${progress > 0 ? `<div class="progress-bar-container"><div class="progress-bar" style="width: ${progress}%"></div></div>` : ''}

                                <div class="overlay-bar">
                                    <span class="episode-text">Ep ${episodeNumber}</span>
                                    ${progress > 0 ? `<span class="percentage-badge">${progress}%</span>` : ''}
                                </div>
                            </div>
                            <div class="info-section">
                                <div class="anime-title">${item.video_title || item.video_slug}</div>
                                <div class="watch-date">${dateStr}</div>
                            </div>
                        </div>`;
                }).join('');

            } catch (err) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <i class="ti ti-alert-triangle"></i>
                        <h3>Gagal Memuat</h3>
                        <p>${err.message}</p>
                    </div>`;
            }
        }

        async function removeItem(slug) {
            openConfirmModal({
                topBarLabel: "KONFIRMASI HAPUS",
                title: "Hapus",
                titleHighlight: "Riwayat",
                description: "Item ini akan dihapus permanen dari riwayat tontonanmu. Aksi ini tidak bisa dibatalkan.",
                cancelText: "BATAL",
                confirmText: "YA HAPUS",
                onConfirm: async () => {
                    await authFetch(`/api/user/history/${slug}`, { method: 'DELETE' });
                    loadHistory();
                }
            });
        }

        async function clearHistory() {
            openConfirmModal({
                topBarLabel: "KONFIRMASI HAPUS",
                title: "Hapus",
                titleHighlight: "Semua Riwayat",
                description: "Semua item riwayat tontonanmu akan dihapus permanen. Aksi ini tidak bisa dibatalkan.",
                cancelText: "BATAL",
                confirmText: "YA HAPUS",
                onConfirm: async () => {
                    await authFetch('/api/user/history', { method: 'DELETE' });
                    loadHistory();
                }
            });
        }

        loadHistory();
    </script>
</body>
</html>
