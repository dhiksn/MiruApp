<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadwal Tayang  MiruApp</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icon/apple-touch-icon.png" />
  <link rel="manifest" href="/icon/site.webmanifest" />
  <style>
    /*  PAGE HEADER  */
    .schedule-header {
      padding: var(--space-12) 0 var(--space-12);
      background: var(--color-primary);
      border-bottom: var(--border-thick) solid var(--color-border);
      text-align: center;
    }
    .schedule-header h1 {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-3);
    }
    .schedule-header p {
      font-family: var(--font-mono);
      font-size: var(--text-base);
      margin-bottom: var(--space-8);
    }

    /*  DAY TABS  */
    .day-tabs-wrapper {
      margin-top: var(--space-2);
      margin-bottom: 0;
      overflow-x: auto;
      padding-bottom: var(--space-3);
    }
    .day-tabs-wrapper::-webkit-scrollbar { height: 8px; }
    .day-tabs-wrapper::-webkit-scrollbar-track { background: var(--color-white); border-left: var(--border); }
    .day-tabs-wrapper::-webkit-scrollbar-thumb { background: var(--color-black); }

    .day-tabs {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: var(--space-4) var(--space-6);
      min-width: max-content;
      padding: 0 var(--space-6);
    }
    .day-tab {
      padding: var(--space-4) var(--space-8);
      text-align: center;
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      background: var(--color-white);
      border: var(--border-thick) solid var(--color-border);
      box-shadow: var(--shadow-sm);
      color: var(--color-black);
      transition: transform var(--duration-fast) var(--ease-snap), box-shadow var(--duration-fast) var(--ease-snap), background var(--duration-fast) var(--ease-snap);
      white-space: nowrap;
    }
    .day-tab:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
    }
    .day-tab.active {
      background: var(--color-primary);
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-md);
    }

    /*  SCHEDULE CARD GRID  */
    .schedule-anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: var(--space-6);
    }

    .schedule-card {
      background: var(--color-surface);
      border: var(--border-thick) solid var(--color-border);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--duration-base) var(--ease-snap), box-shadow var(--duration-base) var(--ease-snap);
    }
    .schedule-card:hover {
      transform: translate(-3px, -3px);
      box-shadow: var(--shadow-xl);
    }

    /* Poster */
    .schedule-card-thumb {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: var(--color-muted);
      border-bottom: var(--border) solid var(--color-border);
    }
    .schedule-card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Badges */
    .card-badge {
      position: absolute;
      top: var(--space-3);
      padding: var(--space-2) var(--space-3);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      z-index: 2;
      border: 2px solid var(--color-border);
      box-shadow: 2px 2px 0px var(--color-border);
    }
    .badge-type {
      left: var(--space-3);
      background: var(--color-tertiary);
      color: var(--color-black);
    }
    .badge-score {
      right: var(--space-3);
      background: var(--color-white);
      color: var(--color-black);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    /* Info */
    .schedule-card-info {
      padding: var(--space-4);
    }
    .schedule-card-title {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--color-black);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
      margin-bottom: var(--space-3);
    }
    .schedule-card-time {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-secondary);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    @media (max-width: 900px) {
      .schedule-anime-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: var(--space-4); }
      .schedule-header h1 { font-size: var(--text-2xl); }
    }
    @media (max-width: 600px) {
      .day-tab { padding: var(--space-3) var(--space-4); font-size: var(--text-xs); }
      .schedule-anime-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">MIRUAPP</a>
  <ul class="navbar-nav">
    <li><a href="/">Home</a></li>
    <li><a href="/ongoing">Ongoing</a></li>
    <li><a href="/movies">Movies</a></li>
    <li><a href="/schedule" class="active">Jadwal</a></li>
    <li><a href="/batch">Batch</a></li>
    <li><a href="/daftar-anime">Daftar Anime</a></li>
  </ul>
  <div class="navbar-right">
    <button class="navbar-search-icon" id="searchBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
    <div id="navAuth"></div>
  </div>
</nav>

<!-- Search Modal -->
<div class="search-modal" id="searchModal">
  <div class="search-modal-overlay" id="searchOverlay"></div>
  <div class="search-modal-content">
    <button class="search-modal-close" id="searchCloseBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="search-modal-input-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="modalSearch" placeholder="Cari anime...">
      <button class="search-modal-submit" id="modalSearchSubmit">Cari</button>
    </div>
  </div>
</div>

<div class="schedule-header">
  <div class="container">
    <h1>Jadwal Tayang</h1>
    <p>Daftar jadwal rilis anime terbaru setiap harinya</p>
    <div class="day-tabs-wrapper">
      <div class="day-tabs" id="dayTabs"></div>
    </div>
  </div>
</div>

<div class="container" style="padding-top:var(--space-8);padding-bottom:var(--space-12)">

  <!-- ANIME GRID -->
  <div class="schedule-anime-grid" id="animeGrid">
    <div class="loading-overlay" style="grid-column:1/-1">
      <div class="spinner"></div><span>Menyiapkan jadwal rilis...</span>
    </div>
  </div>

</div>

<footer>
  <p>MiruApp Wrapper & UI &copy; 2024</p>
</footer>

<script src="/js/helpers.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/search-modal.js"></script>
<script>
  initNavSearch();
  renderAuthNav();

  const DAYS_ID = {
    sunday:'Minggu', monday:'Senin', tuesday:'Selasa',
    wednesday:'Rabu', thursday:'Kamis', friday:'Jumat', saturday:'Sabtu'
  };

  const DAY_ORDER = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

  let allDays   = [];
  let activeDay = '';

  function renderTabs() {
    document.getElementById('dayTabs').innerHTML = allDays.map(d => `
      <div class="day-tab ${d.day === activeDay ? 'active' : ''}"
           onclick="switchDay('${d.day}')">
        ${DAYS_ID[d.day.toLowerCase()] || d.day}
      </div>`).join('');
  }

  function switchDay(day) {
    activeDay = day;
    renderTabs();
    renderGrid();
  }

  function renderGrid() {
    const grid  = document.getElementById('animeGrid');
    const found = allDays.find(d => d.day === activeDay);
    const list  = found?.animeList || [];

    if (!list.length) {
      grid.innerHTML = emptyHTML('', 'Tidak ada anime dijadwalkan hari ini');
      return;
    }

    grid.innerHTML = list.map(a => `
      <div class="schedule-card" onclick="MiruApp('${a.animeId || ''}')">
        <div class="schedule-card-thumb">
          <img src="${a.poster || '/img/placeholder.svg'}" alt="${a.title}"
               loading="lazy" onerror="this.src='/img/placeholder.svg'"/>
          <span class="card-badge badge-type">${a.type || 'TV'}</span>
          ${a.score && a.score !== '0'
            ? `<span class="card-badge badge-score">⭐ ${a.score}</span>` : ''}
        </div>
        <div class="schedule-card-info">
          <div class="schedule-card-title">${a.title}</div>
          <div class="schedule-card-time">
            ⏰ ${a.estimation || 'Jam tayang belum pasti'}
          </div>
        </div>
      </div>`).join('');
  }

  async function loadSchedule() {
    try {
      const res  = await fetch(`${API}/api/schedule`);
      const json = await res.json();
      const days = json.data?.days || [];

      allDays = DAY_ORDER
        .map(d => days.find(x => x.day === d))
        .filter(Boolean);

      if (!allDays.length) {
        document.getElementById('animeGrid').innerHTML = emptyHTML('', 'Data jadwal tidak tersedia');
        return;
      }

      const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });
      activeDay   = allDays.find(d => d.day === today)?.day || allDays[0].day;

      renderTabs();
      renderGrid();
    } catch (err) {
      document.getElementById('animeGrid').innerHTML = errorHTML(err.message);
    }
  }

  loadSchedule();
</script>
</body>
</html>
